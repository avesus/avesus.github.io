<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="cartilage-roadmap-08-wide-title cartilage-roadmap-08-wide-desc">
  <title id="cartilage-roadmap-08-wide-title">Dependency roadmap and evidence-backed status model for the proposed Cartilage continuation</title>
  <desc id="cartilage-roadmap-08-wide-desc">The proposed dependency path moves from component tags through contours, named traces, a larger root, tree validation, one-writer overlap, cooperative reset, a simulator shell, and lessons with live checks. Status advances only from inspectable evidence.</desc>
