t-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#132b25">9</text><text x="922" y="404" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="0" fill="#132b25">LIVE LESSONS</text><text x="922" y="433" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="0" fill="#087a45">PRODUCT TARGET</text><rect x="92" y="505" width="1016" height="36" rx="18" fill="#f0f2f1" stroke="#132b25" stroke-width="2"/><text x="600" y="528.44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.25" fill="#132b25">LIVE STATUS CONTRACT</text><rect x="92" y="545" width="1016" height="82" rx="12" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><text x="600" y="579" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="900" letter-spacing="0" fill="#132b25">IDEA  →  SPECIFIED  →  PROTOTYPED  →  VERIFIED</text><text x="600" y="610" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0" fill="#5d6d67">Advance only with an inspectable artifact, check, or proof link · never invent a completion percentage</text>
