  <title id="cartilage-roadmap-07-mobile-title">Mobile proposed simulator shell with play, pause, step, save, load, host, named inspection, and lessons</title>
  <desc id="cartilage-roadmap-07-mobile-desc">A target browser shell separates runtime controls from save, load, and host operations. It includes a tagged simulator canvas, a named inspector, button-driven lessons, and check-derived lesson progress.</desc>
