 height="68" rx="4" fill="url(#shared-cross)" stroke="#aebdb6" stroke-width="1.5"/><text x="298" y="434" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0" fill="#5d6d67">2,2</text><rect x="336" y="394" width="68" height="68" rx="4" fill="url(#hatch-b)" stroke="#aebdb6" stroke-width="1.5"/><text x="370" y="434" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0" fill="#5d6d67">3,2</text><rect x="120" y="466" width="68" height="68" rx="4" fill="#ffffff" stroke="#aebdb6" stroke-width="1.5"/><text x="154" y="506" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0" fill="#5d6d67">0,3</text><rect x="192" y="466" width="68" height="68" rx="4" fill="url(#hatch-b)" stroke="#aebdb6" stroke-width="1.5"/><text x="226" y="506" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0" fill="#5d6d67">1,3</text><rect x="264" y="466" width="68" height="68" rx="4" fill="url(#hatch-b)" stroke="#aebdb6" stroke-width="1.5"/><text x="298" y="506" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0" fill="#5d6d67">2,3</text><rect x="336" y="466" width="68" height="68" rx="4" fill="url(#hatch-b)" stroke="#aebdb6" stroke-width="1.5"/><text x="370" y="506" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0" fill="#5d6d67">3,3</text><rect x="112" y="242" width="224" height="224" rx="8" fill="none" stroke="#087a45" stroke-width="5"/><rect x="184" y="314" width="224" height="224" rx="8" fill="none" stroke="#175b8f" stroke-width="5" stroke-dasharray="12 8"/><rect x="128" y="202" width="136" height="38" rx="19" fill="#e3f0e9" stroke="#087a45" stroke-width="2"/><text x="196" y="225.42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.25" fill="#132b25">BLOCK A · SOLID</text><rect x="264" y="550" width="152" height="38" rx="19" fill="#e3edf5" stroke="#175b8f" stroke-width="2" stroke-dasharray="8 5"/><text x="340" y="573.42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.25" fill="#132b25">BLOCK B · DASHED</text><polygon points="251.98076211353316,341 251.98076211353316,371 226,386 200.01923788646684,371 200.01923788646684,341 225.99999999999997,326" fill="#132b25" stroke="#132b25" stroke-width="3"/><text x="226" y="362" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="900" letter-spacing="0" fill="#ffffff">W:A</text><path d="M 411.59999999999997 512.8 C 468 492, 452 424, 271.20000000000005 401.20000000000005" fill="none" stroke="#175b8f" stroke-width="5" stroke-dasharray="11 8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-hollow)" opacity="1"/><text x="485" y="502" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="0" fill="#175b8f">PTR(A)</text><rect x="92" y="545" width="466" height="38" rx="19" fill="#ffffff" stroke="#132b25" stroke-width="2"/><text x="325" y="568.42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.25" fill="#132b25">SOLID = OWNERSHIP · DASHED / HOLLOW = REFERENCE</text><rect x="646" y="166" width="510" height="36" rx="18" fill="#e3f0e9" stroke="#087a45" stroke-width="2"/><text x="901" y="189.44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.25" fill="#132b25">ONE WRITER · PASSABLE POINTER · HANDOFF</text><rect x="646" y="208" width="510" height="385" rx="12" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><text x="901" y="259" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="0" fill="#132b25">Writer token moves only after release</text><polygon points="737.444863728671,323 737.444863728671,357 708,374 678.555136271329,357 678.555136271329,323 708,306" fill="#132b25" stroke="#132b25" stroke-width="3"/><text x="708" y="346" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="900" letter-spacing="0" fill="#ffffff">W:A</text><line x1="750" y1="340" x2="824" y2="340" stroke="#132b25" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-ink)" opacity="1"/><rect x="824" y="317" width="138" height="38" rx="19" fill="#ffffff" stroke="#132b25" stroke-width="2"/><text x="893" y="340.42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.25" fill="#132b25">A RELEASES</text><line x1="962" y1="340" x2="1036" y2="340" stroke="#132b25" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-ink)" opacity="1"/><polygon points="1111.444863728671,323 1111.444863728671,357 1082,374 1052.555136271329,357 1052.555136271329,323 1082,306" fill="#175b8f" stroke="#175b8f" stroke-width="3"/><text x="1082" y="346" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="900" letter-spacing="0" fill="#ffffff">W:B</text><path d="M 725 454 C 830 410, 945 498, 1058 454" fill="none" stroke="#175b8f" stroke-width="4" stroke-dasharray="10 7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-hollow)" opacity="1"/><rect x="793" y="445" width="226" height="38" rx="19" fill="#e3edf5" stroke="#175b8f" stroke-width="2" stroke-dasharray="8 5"/><text x="906" y="468.76" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.25" fill="#132b25">PTR(A) MAY PASS</text><rect x="743" y="522" width="316" height="38" rx="19" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="901" y="546.1" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.25" fill="#9a5516">INVARIANT: writers(shared cell) ≤ 1</text><rect x="132" y="615" width="936" height="38" rx="19" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="600" y="639.1" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.25" fill="#9a5516">FUTURE PROTOCOL · THE CURRENT PARTITIONED OWNERSHIP PROOF DOES NOT ESTABLISH OVERLAP</text>
