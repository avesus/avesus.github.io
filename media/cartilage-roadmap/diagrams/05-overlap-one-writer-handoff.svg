<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="cartilage-roadmap-05-wide-title cartilage-roadmap-05-wide-desc">
  <title id="cartilage-roadmap-05-wide-title">Proposed overlapping logical blocks with one writer and a passable reference pointer</title>
  <desc id="cartilage-roadmap-05-wide-desc">Two logical blocks overlap on a four-by-four shared fixture. Solid ownership and dashed reference edges remain distinct. A filled writer token transfers from A to B only after release, preserving at most one writer per shared cell.</desc>
<defs>
    <marker id="arrow-ink" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#132b25"/>
    </marker>
    <marker id="arrow-green" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#087a45"/>
    </marker>
    <marker id="arrow-blue" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#175b8f"/>
    </marker>
    <marker id="arrow-warning" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#9a5516"/>
    </marker>
    <marker id="arrow-hollow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M1,1 L12,6.5 L1,12 z" fill="#ffffff" stroke="#175b8f" stroke-width="2"/>
    </marker>
    <pattern id="hatch-a" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="12" height="12" fill="#e3f0e9"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#087a45" stroke-width="2"/>
    </pattern>
    <pattern id="hatch-b" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)">
      <rect width="12" height="12" fill="#e3edf5"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#175b8f" stroke-width="2"/>
    </pattern>
    <pattern id="shared-cross" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#fff0dc"/>
      <path d="M0,0 L14,14 M14,0 L0,14" stroke="#9a5516" stroke-width="1.8"/>
    </pattern>
    <pattern id="dot-field" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#f0f2f1"/>
      <circle cx="4" cy="4" r="1.7" fill="#89958f"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#fbfaf5"/>
  <rect x="42" y="22" width="412" height="34" rx="17" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="248" y="43.76" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.25" fill="#9a5516">PROPOSED TARGET · NOT CURRENT IMPLEMENTATION</text><text x="44" y="94" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="44" dy="0">Logical overlap, one writer, and an explicit handoff</tspan></text><text x="44" y="136" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500" letter-spacing="0" fill="#5d6d67"><tspan x="44" dy="0">A passable pointer may name or delegate reachability; it is never a second write token.</tspan></text><rect x="44" y="166" width="560" height="36" rx="18" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="324" y="189.44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.25" fill="#132b25">4×4 SHARED FIXTURE · PROPOSED LOGICAL OVERLAP</text><rect x="44" y="208" width="560" height="385" rx="12" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><rect x="120" y="250" width="68" height="68" rx="4" fill="url(#hatch-a)" stroke="#aebdb6" stroke-width="1.5"/><text x="154" y="290" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0" fill="#5d6d67">0,0</text><rect x="192" y="250" width="68" height="68" rx="4" fill="url(#hatch-a)" stroke="#aebdb6" stroke-width="1.5"/><text x="226" y="290" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0" fill="#5d6d67">1,0</text><rect x="264" y="250" width="68" height="68" rx="4" fill="url(#hatch-a)" stroke="#aebdb6" stroke-width="1.5"/><text x="298" y="290" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-we