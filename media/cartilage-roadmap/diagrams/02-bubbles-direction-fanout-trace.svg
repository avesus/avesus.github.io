<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="cartilage-roadmap-02-wide-title cartilage-roadmap-02-wide-desc">
  <title id="cartilage-roadmap-02-wide-title">Signal bubbles compared with a proposed named directional fanout trace</title>
  <desc id="cartilage-roadmap-02-wide-desc">A bubble-style net shows logic value and activity but not the driver. The target trace names counter q3 as the driver of phase_bit and uses arrowheads to show three named sink ports.</desc>
<defs>
    <marker id="arrow-ink" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#132b25"/>
    </marker>
    <marker id="arrow-green" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#087a45"/>
    </marker>
    <marker id="arrow-blue" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#175b8f"/>
    </marker>
    <marker id="arrow-warning" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#9a5516"/>
    </marker>
    <marker id="arrow-hollow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M1,1 L12,6.5 L1,12 z" fill="#ffffff" stroke="#175b8f" stroke-width="2"/>
    </marker>
    <pattern id="hatch-a" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="12" height="12" fill="#e3f0e9"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#087a45" stroke-width="2"/>
    </pattern>
    <pattern id="hatch-b" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)">
      <rect width="12" height="12" fill="#e3edf5"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#175b8f" stroke-width="2"/>
    </pattern>
    <pattern id="shared-cross" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#fff0dc"/>
      <path d="M0,0 L14,14 M14,0 L0,14" stroke="#9a5516" stroke-width="1.8"/>
    </pattern>
    <pattern id="dot-field" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#f0f2f1"/>
      <circle cx="4" cy="4" r="1.7" fill="#89958f"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#fbfaf5"/>
  <rect x="42" y="22" width="412" height="34" rx="17" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="248" y="43.76" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.25" fill="#9a5516">PROPOSED TARGET · NOT CURRENT IMPLEMENTATION</text><text x="44" y="94" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="44" dy="0">Separate value, activity, direction, and identity</tspan></text><text x="44" y="136" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500" letter-spacing="0" fill="#5d6d67"><tspan x="44" dy="0">A click-to-trace view should name one driver, every sink, and the complete fanout.</tspan></text><rect x="44" y="166" width="490" height="36" rx="18" fill="#f0f2f1" stroke="#89958f" stroke-width="2"/><text x="289" y="189.44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.25" fill="#132b25">BUBBLES: VALUE / ACTIVITY</text><rect x="44" y="208" width="490" height="345" rx="12" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><line x1="96" y1="348" x2="482" y2="348" stroke="#132b25" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="1"/><circle cx="146" cy="348" r="22" fill="#ffffff" stroke="#132b25" stroke-width="3"/><text x="146" y="355" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">1</text><circle cx="216" cy="348" r="22" fill="#ffffff" stroke="#132b25" stroke-width="3"/><text x="216" y="355" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">1</text><circle cx="286" cy="348" r="22" fill="#ffffff" stroke="#132b25" stroke-width="3"/><text x="286" y="355" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">1</text><circle cx="356" cy="348" r="22" fill="#ffffff" stroke="#132b25" stroke-width="3"/><text x="356" y="355" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">1</text><circle cx="426" cy="348" r="22" fill="#ffffff" stroke="#132b25" stroke-width="3"/><text x="426" y="355" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">1</text><text x="96" y="296" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="0" fill="#5d6d67">endpoint ?</text><text x="482" y="296" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="0" fill="#5d6d67">endpoint ?</text><text x="289" y="435" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="500" letter-spacing="0" fill="#5d6d67"><tspan x="289" dy="0">Activity is visible.</tspan><tspan x="289" dy="25">The driver is still ambiguous.</tspan></text><rect x="576" y="166" width="580" height="36" rx="18" fill="#e3edf5" stroke="#175b8f" stroke-width="2"/><text x="866" y="189.44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.25" fill="#132b25">TARGET: CLICK-TO-TRACE NAMED FANOUT</text><rect x="576" y="208" width="580" height="345" rx="12" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><rect x="606" y="306" width="172" height="82" rx="12" fill="#e3f0e9" stroke="#087a45" stroke-width="3"/><text x="692" y="337" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="0" fill="#132b25">counter</text><text x="692" y="368" text-anchor="middle" font-family="Consolas, monospace" font-size="17" font-weight="500" letter-spacing="0" fill="#132b25">OUT q[3]</text><rect x="946" y="238" width="174" height="58" rx="8" fill="#e3edf5" stroke="#175b8f" stroke-width="2"/><text x="1033" y="273" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0" fill="#132b25">mux0 · IN sel</text><path d="M 778 347 H 866 V 267 H 946" fill="none" stroke="#175b8f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)" opacity="1"/><rect x="946" y="318" width="174" height="58" rx="8" fill="#e3edf5" stroke="#175b8f" stroke-width="2"/><text x="1033" y="353" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0" fill="#132b25">led0 · IN data</text><path d="M 778 347 H 866 V 347 H 946" fill="none" stroke="#175b8f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)" opacity="1"/><rect x="946" y="398" width="174" height="58" rx="8" fill="#e3edf5" stroke="#175b8f" stroke-width="2"/><text x="1033" y="433" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0" fill="#132b25">probe · IN data</text><path d="M 778 347 H 866 V 427 H 946" fill="none" stroke="#175b8f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)" opacity="1"/><rect x="672" y="480" width="386" height="38" rx="19" fill="#ffffff" stroke="#175b8f" stroke-width="2"/><text x="865" y="504.1" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.25" fill="#132b25">NET phase_bit · DRIVER 1 · SINKS 3</text><rect x="70" y="593" width="244" height="38" rx="19" fill="#ffffff" stroke="#132b25" stroke-width="2"/><text x="192" y="617.78" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="0.25" fill="#132b25">VALUE = 0 / 1</text><rect x="350" y="593" width="244" height="38" rx="19" fill="#f0f2f1" stroke="#89958f" stroke-width="2"/><text x="472" y="617.78" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="0.25" fill="#132b25">ACTIVITY = CIRCLE</text><rect x="630" y="593" width="244" height="38" rx="19" fill="#e3edf5" stroke="#175b8f" stroke-width="2"/><text x="752" y="617.78" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="0.25" fill="#132b25">DIRECTION = ARROW</text><rect x="910" y="593" width="244" height="38" rx="19" fill="#e3f0e9" stroke="#087a45" stroke-width="2"/><text x="1032" y="617.78" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="0.25" fill="#132b25">IDENTITY = PORT NAME</text>
</svg>
