<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="1100" viewBox="0 0 440 1100" role="img" aria-labelledby="cartilage-roadmap-02-mobile-title cartilage-roadmap-02-mobile-desc">
  <title id="cartilage-roadmap-02-mobile-title">Mobile comparison of signal bubbles and a proposed named directional fanout trace</title>
  <desc id="cartilage-roadmap-02-mobile-desc">The first panel shows value-one bubbles without a driver direction. The proposed trace names counter q3 as the driver of phase_bit and shows arrowheads to three named sink ports.</desc>
<defs>
    <marker id="arrow-ink" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#132b25"/>
    </marker>
    <marker id="arrow-green" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#087a45"/>
    </marker>
    <marker id="arrow-blue" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#175b8f"/>
    </marker>
    <marker id="arrow-warning" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#9a5516"/>
    </marker>
    <marker id="arrow-hollow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M1,1 L12,6.5 L1,12 z" fill="#ffffff" stroke="#175b8f" stroke-width="2"/>
    </marker>
    <pattern id="hatch-a" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="12" height="12" fill="#e3f0e9"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#087a45" stroke-width="2"/>
    </pattern>
    <pattern id="hatch-b" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)">
      <rect width="12" height="12" fill="#e3edf5"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#175b8f" stroke-width="2"/>
    </pattern>
    <pattern id="shared-cross" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#fff0dc"/>
      <path d="M0,0 L14,14 M14,0 L0,14" stroke="#9a5516" stroke-width="1.8"/>
    </pattern>
    <pattern id="dot-field" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#f0f2f1"/>
      <circle cx="4" cy="4" r="1.7" fill="#89958f"/>
    </pattern>
  </defs>
  <rect width="440" height="1100" fill="#fbfaf5"/>
  <rect x="18" y="16" width="404" height="34" rx="17" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="220" y="37.42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.25" fill="#9a5516">PROPOSED TARGET · NOT CURRENT IMPLEMENTATION</text><text x="20" y="84" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="20" dy="0">Separate value, activity,</tspan><tspan x="20" dy="29.160000000000004">direction, and identity</tspan></text><text x="20" y="144" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="0" fill="#5d6d67"><tspan x="20" dy="0">Bubbles alone cannot explain fanout.</tspan></text><rect x="20" y="168" width="400" height="36" rx="18" fill="#f0f2f1" stroke="#89958f" stroke-width="2"/><text x="220" y="191.44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.25" fill="#132b25">BUBBLES: VALUE / ACTIVITY</text><rect x="20" y="208" width="400" height="245" rx="12" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><line x1="65" y1="325" x2="375" y2="325" stroke="#132b25" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="1"/><circle cx="105" cy="325" r="18" fill="#ffffff" stroke="#132b25" stroke-width="3"/><text x="105" y="331" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#132b25">1</text><circle cx="165" cy="325" r="18" fill="#ffffff" stroke="#132b25" stroke-width="3"/><text x="165" y="331" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#132b25">1</text><circle cx="225" cy="325" r="18" fill="#ffffff" stroke="#132b25" stroke-width="3"/><text x="225" y="331" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#132b25">1</text><circle cx="285" cy="325" r="18" fill="#ffffff" stroke="#132b25" stroke-width="3"/><text x="285" y="331" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#132b25">1</text><circle cx="345" cy="325" r="18" fill="#ffffff" stroke="#132b25" stroke-width="3"/><text x="345" y="331" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#132b25">1</text><text x="65" y="282" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0" fill="#5d6d67">endpoint ?</text><text x="375" y="282" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0" fill="#5d6d67">endpoint ?</text><text x="220" y="397" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="500" letter-spacing="0" fill="#5d6d67"><tspan x="220" dy="0">Activity is visible.</tspan><tspan x="220" dy="21.25">Driver direction is not.</tspan></text><rect x="20" y="478" width="400" height="36" rx="18" fill="#e3edf5" stroke="#175b8f" stroke-width="2"/><text x="220" y="501.44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.25" fill="#132b25">TARGET: NAMED DIRECTIONAL TRACE</text><rect x="20" y="518" width="400" height="430" rx="12" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><rect x="40" y="564" width="156" height="70" rx="12" fill="#e3f0e9" stroke="#087a45" stroke-width="3"/><text x="118" y="592" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">counter</text><text x="118" y="617" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="500" letter-spacing="0" fill="#132b25">OUT q[3]</text><rect x="244" y="662" width="150" height="56" rx="8" fill="#e3edf5" stroke="#175b8f" stroke-width="2"/><text x="319" y="696" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0" fill="#132b25">mux0 · IN sel</text><path d="M 196 599 H 220 V 690 H 244" fill="none" stroke="#175b8f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)" opacity="1"/><rect x="244" y="732" width="150" height="56" rx="8" fill="#e3edf5" stroke="#175b8f" stroke-width="2"/><text x="319" y="766" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0" fill="#132b25">led0 · IN data</text><path d="M 196 599 H 220 V 760 H 244" fill="none" stroke="#175b8f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)" opacity="1"/><rect x="244" y="802" width="150" height="56" rx="8" fill="#e3edf5" stroke="#175b8f" stroke-width="2"/><text x="319" y="836" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0" fill="#132b25">probe · IN data</text><path d="M 196 599 H 220 V 830 H 244" fill="none" stroke="#175b8f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)" opacity="1"/><rect x="65" y="874" width="310" height="38" rx="19" fill="#ffffff" stroke="#175b8f" stroke-width="2"/><text x="220" y="897.42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.25" fill="#132b25">NET phase_bit · DRIVER 1 · SINKS 3</text><text x="22" y="990" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="22" dy="0">Value = numeral · Activity = circle</tspan><tspan x="22" dy="21.6">Direction = arrowhead · Identity = port name</tspan></text>
</svg>
