<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="1360" viewBox="0 0 440 1360" role="img" aria-labelledby="cartilage-roadmap-06-mobile-title cartilage-roadmap-06-mobile-desc">
  <title id="cartilage-roadmap-06-mobile-title">Mobile sequential diagram of a proposed cooperative kill-pill reset</title>
  <desc id="cartilage-roadmap-06-mobile-desc">Four proposed stages make one or more surrounding owners agree on a closed contour, move a serial token around every boundary edge, authorize reset only when the token returns to its start, and only then inject reset into the enclosed stuck object.</desc>
<defs>
    <marker id="arrow-ink" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#132b25"/>
    </marker>
    <marker id="arrow-green" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#087a45"/>
    </marker>
    <marker id="arrow-blue" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#175b8f"/>
    </marker>
    <marker id="arrow-warning" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#9a5516"/>
    </marker>
    <marker id="arrow-hollow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M1,1 L12,6.5 L1,12 z" fill="#ffffff" stroke="#175b8f" stroke-width="2"/>
    </marker>
    <pattern id="hatch-a" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="12" height="12" fill="#e3f0e9"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#087a45" stroke-width="2"/>
    </pattern>
    <pattern id="hatch-b" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)">
      <rect width="12" height="12" fill="#e3edf5"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#175b8f" stroke-width="2"/>
    </pattern>
    <pattern id="shared-cross" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#fff0dc"/>
      <path d="M0,0 L14,14 M14,0 L0,14" stroke="#9a5516" stroke-width="1.8"/>
    </pattern>
    <pattern id="dot-field" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#f0f2f1"/>
      <circle cx="4" cy="4" r="1.7" fill="#89958f"/>
    </pattern>
  </defs>
  <rect width="440" height="1360" fill="#fbfaf5"/>
  <rect x="18" y="16" width="404" height="34" rx="17" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="220" y="37.42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.25" fill="#9a5516">PROPOSED TARGET · NOT CURRENT IMPLEMENTATION</text><text x="20" y="84" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="20" dy="0">A kill pill is a cooperative,</tspan><tspan x="20" dy="29.160000000000004">closed-contour protocol</tspan></text><text x="20" y="144" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="0" fill="#5d6d67"><tspan x="20" dy="0">Agree, walk the perimeter, close the loop, then inject.</tspan></text><rect x="20" y="168" width="400" height="245" rx="14" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><circle cx="54" cy="202" r="20" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="54" y="207.25" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#9a5516">1</text><text x="86" y="209" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">AGREE ON CONTOUR</text><rect x="219" y="287" width="86" height="58" rx="8" fill="#fff0dc" stroke="#9a5516" stroke-width="3" stroke-dasharray="7 4"/><text x="262" y="308" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="262" dy="0">STUCK</tspan><tspan x="262" dy="13.799999999999999">OBJECT</tspan></text><line x1="164" y1="256" x2="360" y2="256" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="1"/><line x1="360" y1="256" x2="360" y2="376" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="1"/><line x1="360" y1="376" x2="164" y2="376" stroke="#175b8f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="1"/><line x1="164" y1="376" x2="164" y2="256" stroke="#175b8f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="1"/><text x="262" y="248" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="0" fill="#087a45">OWNER A</text><text x="262" y="392" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="0" fill="#175b8f">OWNER B</text><circle cx="164" cy="256" r="14" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="164" y="259.85" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="0" fill="#9a5516">K</text><text x="50" y="276" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="50" dy="0">1 owner:</tspan><tspan x="50" dy="14.64">acts alone</tspan><tspan x="50" dy="14.64"></tspan><tspan x="50" dy="14.64">2+ owners:</tspan><tspan x="50" dy="14.64">agree first</tspan></text><line x1="220" y1="413" x2="220" y2="423" stroke="#132b25" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-ink)" opacity="1"/><rect x="20" y="433" width="400" height="245" rx="14" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><circle cx="54" cy="467" r="20" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="54" y="472.25" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#9a5516">2</text><text x="86" y="474" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">WALK THE BOUNDARY</text><rect x="219" y="552" width="86" height="58" rx="8" fill="#fff0dc" stroke="#9a5516" stroke-width="3" stroke-dasharray="7 4"/><text x="262" y="573" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="262" dy="0">STUCK</tspan><tspan x="262" dy="13.799999999999999">OBJECT</tspan></text><rect x="164" y="521" width="196" height="120" rx="10" fill="none" stroke="#9a5516" stroke-width="4"/><line x1="179" y1="521" x2="345" y2="521" stroke="#9a5516" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-warning)" opacity="1"/><line x1="360" y1="536" x2="360" y2="626" stroke="#9a5516" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-warning)" opacity="1"/><line x1="345" y1="641" x2="179" y2="641" stroke="#9a5516" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-warning)" opacity="1"/><line x1="164" y1="626" x2="164" y2="536" stroke="#9a5516" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-warning)" opacity="1"/><circle cx="360" cy="521" r="14" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="360" y="524.85" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="0" fill="#9a5516">K</text><text x="50" y="541" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="50" dy="0">serial token</tspan><tspan x="50" dy="14.64">walks every</tspan><tspan x="50" dy="14.64">boundary edge</tspan></text><line x1="220" y1="678" x2="220" y2="688" stroke="#132b25" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-ink)" opacity="1"/><rect x="20" y="698" width="400" height="245" rx="14" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><circle cx="54" cy="732" r="20" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="54" y="737.25" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#9a5516">3</text><text x="86" y="739" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">CLOSE = AUTHORIZE</text><rect x="219" y="817" width="86" height="58" rx="8" fill="#fff0dc" stroke="#9a5516" stroke-width="3" stroke-dasharray="7 4"/><text x="262" y="838" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="262" dy="0">STUCK</tspan><tspan x="262" dy="13.799999999999999">OBJECT</tspan></text><rect x="164" y="786" width="196" height="120" rx="10" fill="none" stroke="#087a45" stroke-width="4"/><line x1="179" y1="786" x2="345" y2="786" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)" opacity="1"/><line x1="360" y1="801" x2="360" y2="891" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)" opacity="1"/><line x1="345" y1="906" x2="179" y2="906" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)" opacity="1"/><line x1="164" y1="891" x2="164" y2="801" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)" opacity="1"/><circle cx="164" cy="786" r="15" fill="#e3f0e9" stroke="#087a45" stroke-width="3"/><text x="164" y="789.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="800" letter-spacing="0" fill="#087a45">OK</text><text x="50" y="806" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="50" dy="0">token returns</tspan><tspan x="50" dy="14.64">to its start</tspan><tspan x="50" dy="14.64"></tspan><tspan x="50" dy="14.64">closed loop</tspan><tspan x="50" dy="14.64">authorizes reset</tspan></text><line x1="220" y1="943" x2="220" y2="953" stroke="#132b25" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-ink)" opacity="1"/><rect x="20" y="963" width="400" height="245" rx="14" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><circle cx="54" cy="997" r="20" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="54" y="1002.25" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#9a5516">4</text><text x="86" y="1004" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">INJECT + RESET</text><rect x="164" y="1051" width="196" height="120" rx="10" fill="none" stroke="#087a45" stroke-width="4" stroke-dasharray="8 5"/><rect x="219" y="1082" width="86" height="58" rx="8" fill="url(#dot-field)" stroke="#132b25" stroke-width="3"/><circle cx="164" cy="1111" r="14" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="164" y="1114.85" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="0" fill="#9a5516">K</text><line x1="178" y1="1111" x2="215" y2="1111" stroke="#9a5516" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-warning)" opacity="1"/><text x="262" y="1103" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="262" dy="0">BOOT</tspan><tspan x="262" dy="12.649999999999999">CLAIMABLE</tspan></text><text x="50" y="1071" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="50" dy="0">only now:</tspan><tspan x="50" dy="14.64">inject inward</tspan><tspan x="50" dy="14.64"></tspan><tspan x="50" dy="14.64">outside stays</tspan><tspan x="50" dy="14.64">unchanged</tspan></text><rect x="27" y="1240" width="386" height="38" rx="19" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="220" y="1263.42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.25" fill="#9a5516">SEQUENTIAL · COOPERATIVE · CONTOUR-BOUNDED</text><text x="22" y="1304" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="22" dy="0">No zero-time deletion. No global reset claim.</tspan><tspan x="22" dy="21.6">An open contour must reject the request.</tspan></text>
</svg>
