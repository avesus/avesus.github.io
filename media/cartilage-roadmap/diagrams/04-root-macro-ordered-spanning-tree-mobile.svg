  <title id="cartilage-roadmap-04-mobile-title">Mobile diagram of a proposed larger root macro and ordered spanning-tree ownership claim</title>
  <desc id="cartilage-roadmap-04-mobile-desc">A candidate two-by-two root macro separates local clock, data input, data output, and tree trunk. A tagged component shows parent arrows and deterministic postorder numbering, explicitly labeled as a claim to prove.</desc>
