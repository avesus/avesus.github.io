<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="1050" viewBox="0 0 440 1050" role="img" aria-labelledby="cartilage-roadmap-03-mobile-title cartilage-roadmap-03-mobile-desc">
  <title id="cartilage-roadmap-03-mobile-title">Mobile diagram of the proposed one-cell reconfiguration-port channel-contract limit</title>
  <desc id="cartilage-roadmap-03-mobile-desc">The current one-cell RP role must carry configuration data, local configuration clock, and an owned-tree connection. The proposed interface also requires independent data output, creating a role and channel conflict rather than a geometric theorem about four sides.</desc>
<defs>
    <marker id="arrow-ink" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#132b25"/>
    </marker>
    <marker id="arrow-green" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#087a45"/>
    </marker>
    <marker id="arrow-blue" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#175b8f"/>
    </marker>
    <marker id="arrow-warning" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#9a5516"/>
    </marker>
    <marker id="arrow-hollow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M1,1 L12,6.5 L1,12 z" fill="#ffffff" stroke="#175b8f" stroke-width="2"/>
    </marker>
    <pattern id="hatch-a" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="12" height="12" fill="#e3f0e9"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#087a45" stroke-width="2"/>
    </pattern>
    <pattern id="hatch-b" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)">
      <rect width="12" height="12" fill="#e3edf5"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#175b8f" stroke-width="2"/>
    </pattern>
    <pattern id="shared-cross" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#fff0dc"/>
      <path d="M0,0 L14,14 M14,0 L0,14" stroke="#9a5516" stroke-width="1.8"/>
    </pattern>
    <pattern id="dot-field" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#f0f2f1"/>
      <circle cx="4" cy="4" r="1.7" fill="#89958f"/>
    </pattern>
  </defs>
  <rect width="440" height="1050" fill="#fbfaf5"/>
  <rect x="18" y="16" width="404" height="34" rx="17" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="220" y="37.42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.25" fill="#9a5516">PROPOSED TARGET · NOT CURRENT IMPLEMENTATION</text><text x="20" y="84" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="20" dy="0">Why one RP cell cannot carry</tspan><tspan x="20" dy="29.160000000000004">the target contract</tspan></text><text x="20" y="144" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="0" fill="#5d6d67"><tspan x="20" dy="0">This is a channel limit, not icon geometry.</tspan></text><rect x="20" y="168" width="400" height="36" rx="18" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="220" y="191.44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.25" fill="#132b25">CURRENT ROLE CONTRACT</text><rect x="20" y="208" width="400" height="335" rx="12" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><rect x="153" y="293" width="134" height="134" rx="10" fill="#fff0dc" stroke="#9a5516" stroke-width="4"/><text x="220" y="355" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0" fill="#132b25">1×1 RP</text><text x="220" y="386" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" letter-spacing="0" fill="#9a5516">ROLE</text><line x1="76" y1="294" x2="153" y2="334" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)" opacity="1"/><text x="40" y="260" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="40" dy="0">cfg.DATA</tspan><tspan x="40" dy="20">ingress</tspan></text><line x1="74" y1="438" x2="153" y2="386" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)" opacity="1"/><text x="38" y="466" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="38" dy="0">local</tspan><tspan x="38" dy="20">cfg.CLOCK</tspan></text><line x1="287" y1="360" x2="374" y2="360" stroke="#132b25" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-ink)" opacity="1"/><text x="300" y="322" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="300" dy="0">owned-tree</tspan><tspan x="300" dy="20">connection</tspan></text><line x1="220" y1="427" x2="220" y2="493" stroke="#9a5516" stroke-width="5" stroke-dasharray="9 7" stroke-linecap="round" stroke-linejoin="round" opacity="1"/><rect x="92" y="480" width="256" height="38" rx="19" fill="#ffffff" stroke="#9a5516" stroke-width="2" stroke-dasharray="8 5"/><text x="220" y="503.42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.25" fill="#9a5516">DATA OUT: NO INDEPENDENT LANE</text><rect x="20" y="570" width="400" height="36" rx="18" fill="#e3edf5" stroke="#175b8f" stroke-width="2"/><text x="220" y="593.44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.25" fill="#132b25">TARGET INTERFACE DEMANDS</text><rect x="20" y="610" width="400" height="298" rx="12" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><circle cx="54" cy="646" r="18" fill="#e3edf5" stroke="#175b8f" stroke-width="3"/><text x="54" y="650.9" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="0" fill="#132b25">1</text><text x="84" y="652" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" letter-spacing="0" fill="#132b25">local cfg.clock</text><text x="260" y="652" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="500" letter-spacing="0" fill="#5d6d67">edge / phase</text><circle cx="54" cy="702" r="18" fill="#e3edf5" stroke="#175b8f" stroke-width="3"/><text x="54" y="706.9" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="0" fill="#132b25">2</text><text x="84" y="708" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" letter-spacing="0" fill="#132b25">data.in</text><text x="260" y="708" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="500" letter-spacing="0" fill="#5d6d67">named input</text><circle cx="54" cy="758" r="18" fill="#e3edf5" stroke="#175b8f" stroke-width="3"/><text x="54" y="762.9" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="0" fill="#132b25">3</text><text x="84" y="764" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" letter-spacing="0" fill="#132b25">data.out</text><text x="260" y="764" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="500" letter-spacing="0" fill="#5d6d67">named output</text><circle cx="54" cy="814" r="18" fill="#e3edf5" stroke="#175b8f" stroke-width="3"/><text x="54" y="818.9" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="0" fill="#132b25">4</text><text x="84" y="820" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" letter-spacing="0" fill="#132b25">tree trunk</text><text x="260" y="820" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="500" letter-spacing="0" fill="#5d6d67">owned region</text><rect x="34" y="850" width="372" height="38" rx="19" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="220" y="873.08" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0.25" fill="#9a5516">ROLE / CHANNEL LIMIT · NOT A FOUR-SIDES THEOREM</text><text x="22" y="956" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="22" dy="0">The target must specify independent channels.</tspan><tspan x="22" dy="21.6">A drawing with four arrows is not sufficient proof.</tspan></text>
</svg>
