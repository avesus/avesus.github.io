<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="cartilage-roadmap-07-wide-title cartilage-roadmap-07-wide-desc">
  <title id="cartilage-roadmap-07-wide-title">Proposed Cartilage simulator shell with runtime, project, hosting, and lesson controls</title>
  <desc id="cartilage-roadmap-07-wide-desc">A target browser shell separates play, pause, and step from save, load, and host. A tagged canvas, named inspector, button-driven lessons, and check-derived progress remain observation and control surfaces rather than a privileged fabric interpreter.</desc>
