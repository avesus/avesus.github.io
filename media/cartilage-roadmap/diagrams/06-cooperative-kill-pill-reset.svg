<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="cartilage-roadmap-06-wide-title cartilage-roadmap-06-wide-desc">
  <title id="cartilage-roadmap-06-wide-title">Proposed sequential cooperative kill-pill reset around a closed component contour</title>
  <desc id="cartilage-roadmap-06-wide-desc">One or more surrounding owners first agree on a closed contour. A serial token then walks every boundary edge and must return to its start before reset is authorized and injected into the enclosed stuck object. The outside fabric remains unchanged.</desc>
<defs>
    <marker id="arrow-ink" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#132b25"/>
    </marker>
    <marker id="arrow-green" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#087a45"/>
    </marker>
    <marker id="arrow-blue" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#175b8f"/>
    </marker>
    <marker id="arrow-warning" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#9a5516"/>
    </marker>
    <marker id="arrow-hollow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M1,1 L12,6.5 L1,12 z" fill="#ffffff" stroke="#175b8f" stroke-width="2"/>
    </marker>
    <pattern id="hatch-a" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="12" height="12" fill="#e3f0e9"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#087a45" stroke-width="2"/>
    </pattern>
    <pattern id="hatch-b" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)">
      <rect width="12" height="12" fill="#e3edf5"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#175b8f" stroke-width="2"/>
    </pattern>
    <pattern id="shared-cross" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#fff0dc"/>
      <path d="M0,0 L14,14 M14,0 L0,14" stroke="#9a5516" stroke-width="1.8"/>
    </pattern>
    <pattern id="dot-field" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#f0f2f1"/>
      <circle cx="4" cy="4" r="1.7" fill="#89958f"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#fbfaf5"/>
  <rect x="42" y="22" width="412" height="34" rx="17" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="248" y="43.76" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.25" fill="#9a5516">PROPOSED TARGET · NOT CURRENT IMPLEMENTATION</text><text x="44" y="94" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="44" dy="0">A kill pill is a cooperative, closed-contour protocol</tspan></text><text x="44" y="136" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500" letter-spacing="0" fill="#5d6d67"><tspan x="44" dy="0">Agree, walk the perimeter, close the loop, then inject reset inward.</tspan></text><rect x="35" y="198" width="262" height="370" rx="14" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><circle cx="69" cy="232" r="20" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="69" y="237.25" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#9a5516">1</text><text x="101" y="239" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">AGREE ON CONTOUR</text><rect x="137" y="385" width="58" height="68" rx="8" fill="#fff0dc" stroke="#9a5516" stroke-width="3" stroke-dasharray="7 4"/><text x="166" y="407" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="166" dy="0">STUCK</tspan><tspan x="166" dy="12.649999999999999">OBJECT</tspan></text><line x1="101" y1="344" x2="231" y2="344" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="1"/><line x1="231" y1="344" x2="231" y2="494" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="1"/><line x1="231" y1="494" x2="101" y2="494" stroke="#175b8f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="1"/><line x1="101" y1="494" x2="101" y2="344" stroke="#175b8f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="1"/><text x="166" y="336" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="0" fill="#087a45">OWNER A</text><text x="166" y="510" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="0" fill="#175b8f">OWNER B</text><circle cx="101" cy="344" r="13" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="101" y="347.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="800" letter-spacing="0" fill="#9a5516">K</text><text x="166" y="299" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="166" dy="0">1 owner acts alone</tspan><tspan x="166" dy="13.42">2+ owners agree first</tspan></text><line x1="297" y1="383" x2="316" y2="383" stroke="#132b25" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-ink)" opacity="1"/><rect x="326" y="198" width="262" height="370" rx="14" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><circle cx="360" cy="232" r="20" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="360" y="237.25" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#9a5516">2</text><text x="392" y="239" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">WALK BOUNDARY</text><rect x="428" y="385" width="58" height="68" rx="8" fill="#fff0dc" stroke="#9a5516" stroke-width="3" stroke-dasharray="7 4"/><text x="457" y="407" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="457" dy="0">STUCK</tspan><tspan x="457" dy="12.649999999999999">OBJECT</tspan></text><rect x="392" y="344" width="130" height="150" rx="10" fill="none" stroke="#9a5516" stroke-width="4"/><line x1="407" y1="344" x2="507" y2="344" stroke="#9a5516" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-warning)" opacity="1"/><line x1="522" y1="359" x2="522" y2="479" stroke="#9a5516" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-warning)" opacity="1"/><line x1="507" y1="494" x2="407" y2="494" stroke="#9a5516" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-warning)" opacity="1"/><line x1="392" y1="479" x2="392" y2="359" stroke="#9a5516" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-warning)" opacity="1"/><circle cx="522" cy="344" r="13" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="522" y="347.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="800" letter-spacing="0" fill="#9a5516">K</text><text x="457" y="299" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="457" dy="0">Serial token walks</tspan><tspan x="457" dy="13.42">every boundary edge</tspan></text><line x1="588" y1="383" x2="607" y2="383" stroke="#132b25" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-ink)" opacity="1"/><rect x="617" y="198" width="262" height="370" rx="14" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><circle cx="651" cy="232" r="20" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="651" y="237.25" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#9a5516">3</text><text x="683" y="239" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">CLOSE = AUTHORIZE</text><rect x="719" y="385" width="58" height="68" rx="8" fill="#fff0dc" stroke="#9a5516" stroke-width="3" stroke-dasharray="7 4"/><text x="748" y="407" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="748" dy="0">STUCK</tspan><tspan x="748" dy="12.649999999999999">OBJECT</tspan></text><rect x="683" y="344" width="130" height="150" rx="10" fill="none" stroke="#087a45" stroke-width="4"/><line x1="698" y1="344" x2="798" y2="344" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)" opacity="1"/><line x1="813" y1="359" x2="813" y2="479" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)" opacity="1"/><line x1="798" y1="494" x2="698" y2="494" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)" opacity="1"/><line x1="683" y1="479" x2="683" y2="359" stroke="#087a45" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)" opacity="1"/><circle cx="683" cy="344" r="14" fill="#e3f0e9" stroke="#087a45" stroke-width="3"/><text x="683" y="347.15" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="800" letter-spacing="0" fill="#087a45">OK</text><text x="748" y="299" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="748" dy="0">Return to start</tspan><tspan x="748" dy="13.42">authorizes reset</tspan></text><line x1="879" y1="383" x2="898" y2="383" stroke="#132b25" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-ink)" opacity="1"/><rect x="908" y="198" width="262" height="370" rx="14" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><circle cx="942" cy="232" r="20" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="942" y="237.25" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0" fill="#9a5516">4</text><text x="974" y="239" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25">INJECT + RESET</text><rect x="974" y="344" width="130" height="150" rx="10" fill="none" stroke="#087a45" stroke-width="4" stroke-dasharray="8 5"/><rect x="1010" y="385" width="58" height="68" rx="8" fill="url(#dot-field)" stroke="#132b25" stroke-width="3"/><circle cx="974" cy="419" r="13" fill="#fff0dc" stroke="#9a5516" stroke-width="3"/><text x="974" y="422.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="800" letter-spacing="0" fill="#9a5516">K</text><line x1="987" y1="419" x2="1006" y2="419" stroke="#9a5516" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-warning)" opacity="1"/><text x="1039" y="407" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="1039" dy="0">BOOT</tspan><tspan x="1039" dy="11.5">CLAIMABLE</tspan></text><text x="1039" y="299" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="0" fill="#132b25"><tspan x="1039" dy="0">Only now: inject inward</tspan><tspan x="1039" dy="13.42">Outside stays unchanged</tspan></text><rect x="126" y="603" width="948" height="38" rx="19" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="600" y="627.1" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.25" fill="#9a5516">SEQUENTIAL · COOPERATIVE · CLOSED-CONTOUR ONLY · NO ZERO-TIME OR GLOBAL RESET CLAIM</text>
</svg>
