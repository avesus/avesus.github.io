<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="cartilage-roadmap-03-wide-title cartilage-roadmap-03-wide-desc">
  <title id="cartilage-roadmap-03-wide-title">Proposed one-cell reconfiguration-port channel-contract limit</title>
  <desc id="cartilage-roadmap-03-wide-desc">The one-cell RP role carries configuration data, local configuration clock, and an owned-tree connection. The target also needs independent data output. The conflict is identified as a role and channel constraint, not a theorem about four geometric sides.</desc>
<defs>
    <marker id="arrow-ink" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#132b25"/>
    </marker>
    <marker id="arrow-green" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#087a45"/>
    </marker>
    <marker id="arrow-blue" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#175b8f"/>
    </marker>
    <marker id="arrow-warning" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#9a5516"/>
    </marker>
    <marker id="arrow-hollow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M1,1 L12,6.5 L1,12 z" fill="#ffffff" stroke="#175b8f" stroke-width="2"/>
    </marker>
    <pattern id="hatch-a" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="12" height="12" fill="#e3f0e9"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#087a45" stroke-width="2"/>
    </pattern>
    <pattern id="hatch-b" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)">
      <rect width="12" height="12" fill="#e3edf5"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#175b8f" stroke-width="2"/>
    </pattern>
    <pattern id="shared-cross" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#fff0dc"/>
      <path d="M0,0 L14,14 M14,0 L0,14" stroke="#9a5516" stroke-width="1.8"/>
    </pattern>
    <pattern id="dot-field" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#f0f2f1"/>
      <circle cx="4" cy="4" r="1.7" fill="#89958f"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#fbfaf5"/>
  <rect x="42" y="22" width="412" height="34" rx="17" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="248" y="43.76" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.25" fill="#9a5516">PROPOSED TARGET · NOT CURRENT IMPLEMENTATION</text><text x="44" y="94" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="44" dy="0">Why one RP cell cannot carry the target contract</tspan></text><text x="44" y="136" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500" letter-spacing="0" fill="#5d6d67"><tspan x="44" dy="0">The target adds independent data-out and root connectivity to the existing configuration obligations.</tspan></text><rect x="44" y="166" width="500" height="36" rx="18" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="294" y="189.44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.25" fill="#132b25">CURRENT 1×1 ROLE CONTRACT</text><rect x="44" y="208" width="500" height="365" rx="12" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><rect x="200" y="292" width="180" height="180" rx="10" fill="#fff0dc" stroke="#9a5516" stroke-width="4"/><text x="290" y="377" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="29" font-weight="800" letter-spacing="0" fill="#132b25">1×1 RP</text><text x="290" y="408" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="800" letter-spacing="0" fill="#9a5516">ROLE</text><line x1="92" y1="284" x2="202" y2="340" stroke="#087a45" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)" opacity="1"/><text x="76" y="250" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0" fill="#132b25"><tspan x="76" dy="0">c