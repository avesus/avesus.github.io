"706" y="275.6" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="0" fill="#132b25">1</text><text x="746" y="276" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="0" fill="#132b25">local cfg.clock</text><text x="942" y="276" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="500" letter-spacing="0" fill="#5d6d67">timing / phase input</text><circle cx="706" cy="336" r="22" fill="#e3edf5" stroke="#175b8f" stroke-width="3"/><text x="706" y="341.6" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="0" fill="#132b25">2</text><text x="746" y="342" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="0" fill="#132b25">data.in</text><text x="942" y="342" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="500" letter-spacing="0" fill="#5d6d67">named application input</text><circle cx="706" cy="402" r="22" fill="#e3edf5" stroke="#175b8f" stroke-width="3"/><text x="706" y="407.6" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="0" fill="#132b25">3</text><text x="746" y="408" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="0" fill="#132b25">data.out</text><text x="942" y="408" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="500" letter-spacing="0" fill="#5d6d67">named application output</text><circle cx="706" cy="468" r="22" fill="#e3edf5" stroke="#175b8f" stroke-width="3"/><text x="706" y="473.6" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="0" fill="#132b25">4</text><text x="746" y="474" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="0" fill="#132b25">owned-tree trunk</text><text x="942" y="474" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="500" letter-spacing="0" fill="#5d6d67">internal traversal path</text><rect x="713" y="515" width="386" height="38" rx="19" fill="#ffffff" stroke="#175b8f" stroke-width="2"/><text x="906" y="539.1" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.25" fill="#132b25">FOUR INDEPENDENT OBLIGATIONS</text><rect x="190" y="610" width="820" height="38" rx="19" fill="#fff0dc" stroke="#9a5516" stroke-width="2"/><text x="600" y="634.1" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.25" fill="#9a5516">ROLE / CHANNEL CONSTRAINT · NOT A CLAIM THAT FOUR DRAWN SIDES ARE IMPOSSIBLE</text>
</svg>
