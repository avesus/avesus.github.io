-weight="700" letter-spacing="0.25" fill="#132b25">BLOCK A · SOLID</text><rect x="220" y="512" width="128" height="38" rx="19" fill="#e3edf5" stroke="#175b8f" stroke-width="2" stroke-dasharray="8 5"/><text x="284" y="534.74" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="0.25" fill="#132b25">BLOCK B · DASHED</text><polygon points="208.65063509461098,330.5 208.65063509461098,355.5 187,368 165.34936490538902,355.5 165.34936490538902,330.5 186.99999999999997,318" fill="#132b25" stroke="#132b25" stroke-width="3"/><text x="187" y="349" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="900" letter-spacing="0" fill="#ffffff">W:A</text><path d="M 319.20000000000005 472.1 C 350 470, 340 410, 226.20000000000002 382.20000000000005" fill="none" stroke="#175b8f" stroke-width="4" stroke-dasharray="10 7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-hollow)" opacity="1"/><text x="316" y="511" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="0" fill="#175b8f">PTR(A)</text><rect x="54" y="590" width="332" height="38" rx="19" fill="#ffffff" stroke="#132b25" stroke-width="2"/><text x="220" y="613.08" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0.25" fill="#132b25">SOLID = OWNERSHIP · DASHED = REFERENCE</text><rect x="20" y="678" width="400" height="36" rx="18" fill="#e3f0e9" stroke="#087a45" stroke-width="2"/><text x="220" y="701.44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.25" fill="#132b25">SINGLE-WRITER HANDOFF</text><rect x="20" y="718" width="400" height="270" rx="12" fill="#ffffff" stroke="#aebdb6" stroke-width="2"/><polygon points="98.38268590217984,801.5 98.38268590217984,828.5 75,842 51.617314097820156,828.5 51.617314097820156,801.5 74.9999999999999