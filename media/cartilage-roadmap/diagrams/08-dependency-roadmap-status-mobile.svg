<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="1320" viewBox="0 0 440 1320" role="img" aria-labelledby="cartilage-roadmap-08-mobile-title cartilage-roadmap-08-mobile-desc">
  <title id="cartilage-roadmap-08-mobile-title">Mobile dependency roadmap for the proposed Cartilage continuation</title>
  <desc id="cartilage-roadmap-08-mobile-desc">A vertical dependency rail orders tags, contours, traces, a larger root, tree validation, single-writer overlap, cooperative reset, a simulator shell, and lessons with live checks. Every step is labeled proposed, target, to specify, or to prove.</desc>
