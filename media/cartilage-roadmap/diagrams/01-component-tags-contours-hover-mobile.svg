  <title id="cartilage-roadmap-01-mobile-title">Mobile diagram of component tags without a reconfiguration-port root</title>
  <desc id="cartilage-roadmap-01-mobile-desc">A proposed cell tag identifies an irregular component without an RP cell. A second view derives a solid contour, patterned background, and focus label from the same tags.</desc>
