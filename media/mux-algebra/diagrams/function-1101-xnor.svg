<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="610" viewBox="0 0 440 610" role="img" aria-labelledby="title desc">
  <title id="title">XNOR built from multiplexers</title>
  <desc id="desc">Y = NOT (A XOR B). B=0 passes NOT A; B=1 passes A. The smallest circuit uses 2 multiplexers. Its 2020 pointer word is 1101 and its truth vector is 1001.</desc>
  <style>
    .paper { fill: #fbfaf5; }
    .panel { fill: #ffffff; stroke: #aebdb6; stroke-width: 2; }
    .ink { fill: #132b25; }
    .muted { fill: #5d6d67; }
    .wire { fill: none; stroke: #132b25; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    .wire-active { fill: none; stroke: #087a45; stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; }
    .wire-inactive { fill: none; stroke: #97a39f; stroke-width: 4; stroke-dasharray: 12 10; stroke-linecap: round; }
    .mux { fill: #eef5f1; stroke: #132b25; stroke-width: 4; }
    .chip { fill: #fff; stroke: #aebdb6; stroke-width: 2; }
    .choice { fill: #fff7e9; stroke: #9a5516; stroke-width: 2; }
    .truth-on { fill: #087a45; }
    .truth-off { fill: #e2e7e4; }
    .title { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #132b25; }
    .heading { font: 700 32px "Segoe UI", Arial, sans-serif; fill: #132b25; }
    .label { font: 600 28px "Segoe UI", Arial, sans-serif; fill: #132b25; }
    .body { font: 24px "Segoe UI", Arial, sans-serif; fill: #132b25; }
    .small { font: 21px "Segoe UI", Arial, sans-serif; fill: #5d6d67; }
    .tiny { font: 18px "Segoe UI", Arial, sans-serif; fill: #5d6d67; }
    .code { font: 600 24px Consolas, "Courier New", monospace; fill: #132b25; }
    .code-small { font: 600 20px Consolas, "Courier New", monospace; fill: #132b25; }
    .center { text-anchor: middle; }
    .right { text-anchor: end; }
  </style>
  <rect class="paper" width="440" height="610"/>

  <style>
    .tiny { font-size: 20px; }
    .code-small { font-size: 21px; }
  </style>
  <text class="heading" x="20" y="40">XNOR</text>
  <text class="code-small right" x="420" y="38">2 MUXes</text>
  <text class="label" x="20" y="78">Y = NOT (A XOR B)</text>

  <rect class="panel" x="10" y="122" width="420" height="428" rx="18"/>

  <text class="small" x="22" y="158">1. make NOT A</text>
  <path class="mux" d="M 74 184 L 154 198 L 154 272 L 74 286 Z"/>
  <path class="wire" d="M 24 210 H 74"/>
  <path class="wire" d="M 24 260 H 74"/>
  <text class="code-small right" x="64" y="217">1</text>
  <text class="code-small right" x="64" y="267">0</text>
  <text class="code-small center" x="114" y="242">MUX</text>
  <path class="wire" d="M 114 326 V 280"/>
  <text class="code-small" x="128" y="322">A</text>
  <path class="wire" d="M 154 235 H 164 V 218 H 242"/>
  <text class="small" x="168" y="208">NOT A</text>
  <rect class="chip" x="174" y="242" width="68" height="40" rx="9"/>
  <text class="code-small center" x="208" y="270">A</text>
  <path class="mux" d="M 242 170 L 342 190 L 342 290 L 242 310 Z"/>
  <text class="tiny" x="252" y="198">D0 / S=0</text>
  <text class="tiny" x="252" y="296">D1 / S=1</text>
  <text class="code-small center" x="292" y="247">MUX</text>
  <path class="wire" d="M 292 352 V 302"/>
  <text class="code-small" x="308" y="348">B</text>
  <path class="wire" d="M 342 240 H 396"/>
  <text class="code" x="404" y="248">Y</text>

  <rect class="truth-on" x="22" y="396" width="192" height="62" rx="10"/>
  <text class="small center" x="118" y="419" style="fill:#ffffff">A=0  B=0</text>
  <text class="label center" x="118" y="448" style="fill:#ffffff">Y=1</text>
  <rect class="truth-off" x="224" y="396" width="192" height="62" rx="10"/>
  <text class="small center" x="320" y="419" style="fill:#132b25">A=0  B=1</text>
  <text class="label center" x="320" y="448" style="fill:#132b25">Y=0</text>
  <rect class="truth-off" x="22" y="468" width="192" height="62" rx="10"/>
  <text class="small center" x="118" y="491" style="fill:#132b25">A=1  B=0</text>
  <text class="label center" x="118" y="520" style="fill:#132b25">Y=0</text>
  <rect class="truth-on" x="224" y="468" width="192" height="62" rx="10"/>
  <text class="small center" x="320" y="491" style="fill:#ffffff">A=1  B=1</text>
  <text class="label center" x="320" y="520" style="fill:#ffffff">Y=1</text>
  <text class="code-small" x="20" y="590">pointer 11 | 01</text>
  <text class="small right" x="420" y="590">truth 1001</text>
</svg>
