<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="640" viewBox="0 0 440 640" role="img" aria-labelledby="title desc">
  <title id="title">Mobile view of the four-bit configuration word</title>
  <desc id="desc">C3 and C2 address the B equals zero branch. C1 and C0 address the B equals one branch.</desc>
  <style>
    .paper { fill: #fbfaf5; }
    .panel { fill: #ffffff; stroke: #aebdb6; stroke-width: 2; }
    .ink { fill: #132b25; }
    .muted { fill: #5d6d67; }
    .wire { fill: none; stroke: #132b25; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    .wire-active { fill: none; stroke: #087a45; stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; }
    .wire-inactive { fill: none; stroke: #97a39f; stroke-width: 4; stroke-dasharray: 12 10; stroke-linecap: round; }
    .mux { fill: #eef5f1; stroke: #132b25; stroke-width: 4; }
    .chip { fill: #fff; stroke: #aebdb6; stroke-width: 2; }
    .choice { fill: #fff7e9; stroke: #9a5516; stroke-width: 2; }
    .truth-on { fill: #087a45; }
    .truth-off { fill: #e2e7e4; }
    .title { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #132b25; }
    .heading { font: 700 32px "Segoe UI", Arial, sans-serif; fill: #132b25; }
    .label { font: 600 28px "Segoe UI", Arial, sans-serif; fill: #132b25; }
    .body { font: 24px "Segoe UI", Arial, sans-serif; fill: #132b25; }
    .small { font: 21px "Segoe UI", Arial, sans-serif; fill: #5d6d67; }
    .tiny { font: 18px "Segoe UI", Arial, sans-serif; fill: #5d6d67; }
    .code { font: 600 24px Consolas, "Courier New", monospace; fill: #132b25; }
    .code-small { font: 600 20px Consolas, "Courier New", monospace; fill: #132b25; }
    .center { text-anchor: middle; }
    .right { text-anchor: end; }
  </style>
  <rect class="paper" width="440" height="640"/>

  <text class="label" x="20" y="40">Four bits -> two addresses</text>
  <rect class="panel" x="14" y="70" width="412" height="526" rx="18"/>
  <text class="label center" x="220" y="120">CONFIG</text>
  <rect class="choice" x="70" y="144" width="300" height="72" rx="12"/>
  <text class="code center" x="220" y="189">C3 C2</text>
  <path class="wire" d="M 220 218 V 250"/>
  <rect class="chip" x="56" y="250" width="328" height="92" rx="12"/>
  <text class="label center" x="220" y="290">B=0 branch</text>
  <text class="small center" x="220" y="322">choose 0, A, 1, or NOT A</text>
  <rect class="choice" x="70" y="370" width="300" height="72" rx="12"/>
  <text class="code center" x="220" y="415">C1 C0</text>
  <path class="wire" d="M 220 444 V 472"/>
  <rect class="chip" x="56" y="472" width="328" height="92" rx="12"/>
  <text class="label center" x="220" y="512">B=1 branch</text>
  <text class="small center" x="220" y="544">choose 0, A, 1, or NOT A</text>
  <text class="code-small center" x="220" y="626">Y = B ? low source : high source</text>
</svg>
