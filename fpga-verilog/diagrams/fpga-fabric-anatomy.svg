<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-labelledby="fpga-fabric-anatomy-title fpga-fabric-anatomy-desc">
  <title id="fpga-fabric-anatomy-title">FPGA fabric from array to logic block to logic element</title>
  <desc id="fpga-fabric-anatomy-desc">A nested view shows a two-dimensional FPGA fabric, one logic array block and switchbox, and one logic element containing a LUT, flip-flop, and output multiplexer.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#171717"/>
    </marker>
    <marker id="forest-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#24513f"/>
    </marker>
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#b8b4a8"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#faf8f2"/>
  <text x="600" y="58" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="34" font-weight="700" letter-spacing="0" fill="#171717">Zoom from the fabric to one stored bit</text><rect x="55" y="105" width="325" height="470" rx="12" fill="url(#dot-grid)" stroke="#3d5861" stroke-width="3"/><rect x="438" y="105" width="325" height="470" rx="12" fill="#ffffff" stroke="#9a7422" stroke-width="3"/><rect x="820" y="105" width="325" height="470" rx="12" fill="#ffffff" stroke="#24513f" stroke-width="3"/><text x="217" y="144" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="0" fill="#3d5861">FPGA FABRIC</text><text x="600" y="144" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="0" fill="#9a7422">LOGIC ARRAY BLOCK</text><text x="982" y="144" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="0" fill="#24513f">LOGIC ELEMENT</text><rect x="83" y="184" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="138" y="184" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="193" y="184" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="248" y="184" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="303" y="184" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="83" y="247" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="138" y="247" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="193" y="247" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="248" y="247" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="303" y="247" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="83" y="310" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="138" y="310" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="193" y="310" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="248" y="310" width="42" height="42" rx="5" fill="#f1e8c8" stroke="#9a7422" stroke-width="4"/><rect x="303" y="310" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="83" y="373" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="138" y="373" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="193" y="373" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="248" y="373" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="303" y="373" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="83" y="436" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="138" y="436" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="193" y="436" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="248" y="436" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="303" y="436" width="42" height="42" rx="5" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="217" y="531" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="19" font-weight="400" fill="#5f625d"><tspan x="217" dy="0">Repeated blocks sit in</tspan><tspan x="217" dy="23.75">a routed two-dimensional array</tspan></text><rect x="474" y="185" width="150" height="300" rx="8" fill="#f1e8c8" stroke="#9a7422" stroke-width="3"/><text x="549" y="224" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="21" font-weight="700" letter-spacing="0" fill="#9a7422">LOCAL</text><text x="549" y="251" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="21" font-weight="700" letter-spacing="0" fill="#9a7422">SWITCHBOX</text><line x1="490" y1="290" x2="608" y2="290" stroke="#9a7422" stroke-width="4"/><line x1="490" y1="324" x2="608" y2="324" stroke="#9a7422" stroke-width="4"/><line x1="490" y1="358" x2="608" y2="358" stroke="#9a7422" stroke-width="4"/><line x1="490" y1="392" x2="608" y2="392" stroke="#9a7422" stroke-width="4"/><line x1="490" y1="426" x2="608" y2="426" stroke="#9a7422" stroke-width="4"/><rect x="662" y="205" width="70" height="48" rx="6" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="662" y="278" width="70" height="48" rx="6" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="662" y="351" width="70" height="48" rx="6" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><rect x="662" y="424" width="70" height="48" rx="6" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="697" y="236" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" letter-spacing="0" fill="#3d5861">LE 1</text><text x="697" y="309" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" letter-spacing="0" fill="#3d5861">LE 2</text><text x="697" y="382" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" letter-spacing="0" fill="#3d5861">LE 3</text><text x="697" y="455" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" letter-spacing="0" fill="#3d5861">LE 4</text><line x1="624" y1="229" x2="662" y2="229" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><line x1="624" y1="302" x2="662" y2="302" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><line x1="624" y1="375" x2="662" y2="375" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><line x1="624" y1="448" x2="662" y2="448" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><text x="600" y="531" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="19" font-weight="400" fill="#5f625d"><tspan x="600" dy="0">Local routes select which</tspan><tspan x="600" dy="23.75">logic elements can communicate</tspan></text><rect x="850" y="205" width="112" height="90" rx="7" fill="#dfe9ec" stroke="#3d5861" stroke-width="3"/><text x="906" y="260" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="700" letter-spacing="0" fill="#3d5861">LUT</text><rect x="1010" y="342" width="96" height="88" rx="7" fill="#eedfd7" stroke="#6b2f1f" stroke-width="3"/><text x="1058" y="395" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="27" font-weight="700" letter-spacing="0" fill="#6b2f1f">D-FF</text><path d="M986 240 L1032 215 L1032 265 Z" fill="#dce9e2" stroke="#24513f" stroke-width="3"/><path d="M986 338 L1032 313 L1032 363 Z" fill="#dce9e2" stroke="#24513f" stroke-width="3"/><line x1="824" y1="240" x2="850" y2="240" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><line x1="962" y1="250" x2="986" y2="250" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><line x1="1032" y1="240" x2="1117" y2="240" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><line x1="962" y1="270" x2="962" y2="386" stroke="#6b2f1f" stroke-width="3"/><line x1="962" y1="386" x2="1010" y2="386" stroke="#6b2f1f" stroke-width="3" marker-end="url(#arrow)"/><line x1="1106" y1="386" x2="1125" y2="386" stroke="#6b2f1f" stroke-width="3"/><line x1="1125" y1="386" x2="1125" y2="322" stroke="#6b2f1f" stroke-width="3"/><line x1="1125" y1="322" x2="1032" y2="322" stroke="#6b2f1f" stroke-width="3" marker-end="url(#arrow)"/><text x="982" y="470" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="400" fill="#5f625d"><tspan x="982" dy="0">The LUT computes a Boolean function.</tspan><tspan x="982" dy="22.1">The flip-flop stores state</tspan><tspan x="982" dy="22.1">for the next edge.</tspan></text><line x1="380" y1="340" x2="438" y2="340" stroke="#9a7422" stroke-width="5" marker-end="url(#arrow)"/><line x1="763" y1="340" x2="820" y2="340" stroke="#24513f" stroke-width="5" marker-end="url(#arrow)"/><rect x="337" y="605" width="526" height="42" rx="21" fill="#f1e8c8" stroke="#9a7422" stroke-width="2"/><text x="600" y="634" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0.4" fill="#171717">ARRAY → BLOCK + ROUTING → LUT + STATE</text>
</svg>
