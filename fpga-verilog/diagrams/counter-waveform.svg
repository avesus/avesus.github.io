<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-labelledby="counter-waveform-title counter-waveform-desc">
  <title id="counter-waveform-title">Clocked counter waveform with reset and five state updates</title>
  <desc id="counter-waveform-desc">Reset holds a four-bit counter at zero; after reset is released between clock edges, the count changes on each rising edge and is checked after five updates.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#171717"/>
    </marker>
    <marker id="forest-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#24513f"/>
    </marker>
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#b8b4a8"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#faf8f2"/>
  <text x="600" y="58" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="34" font-weight="700" letter-spacing="0" fill="#171717">State changes at an edge, not continuously</text><rect x="80" y="103" width="1040" height="442" rx="8" fill="#ffffff" stroke="#b8b4a8" stroke-width="2"/><line x1="260" y1="115" x2="260" y2="528" stroke="#eedfd7" stroke-width="2" stroke-dasharray="6 8"/><line x1="370" y1="115" x2="370" y2="528" stroke="#eedfd7" stroke-width="2" stroke-dasharray="6 8"/><line x1="480" y1="115" x2="480" y2="528" stroke="#dce9e2" stroke-width="2" stroke-dasharray="6 8"/><line x1="590" y1="115" x2="590" y2="528" stroke="#dce9e2" stroke-width="2" stroke-dasharray="6 8"/><line x1="700" y1="115" x2="700" y2="528" stroke="#dce9e2" stroke-width="2" stroke-dasharray="6 8"/><line x1="810" y1="115" x2="810" y2="528" stroke="#dce9e2" stroke-width="2" stroke-dasharray="6 8"/><line x1="920" y1="115" x2="920" y2="528" stroke="#dce9e2" stroke-width="2" stroke-dasharray="6 8"/><line x1="1030" y1="115" x2="1030" y2="528" stroke="#dce9e2" stroke-width="2" stroke-dasharray="6 8"/><text x="130" y="177" text-anchor="start" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="0" fill="#3d5861">clk</text><text x="130" y="290" text-anchor="start" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="0" fill="#6b2f1f">reset</text><text x="150" y="412" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0" fill="#24513f">count[3:0]</text><path d="M230 195 L285 195 L285 135 L340 135 L340 195 L395 195 L395 135 L450 135 L450 195 L505 195 L505 135 L560 135 L560 195 L615 195 L615 135 L670 135 L670 195 L725 195 L725 135 L780 135 L780 195 L835 195 L835 135 L890 135 L890 195 L945 195 L945 135 L1000 135 L1000 195 L1055 195 L1055 135 L1110 135 L1110 195" fill="none" stroke="#3d5861" stroke-width="5"/><path d="M230 250 L370 250 L370 310 L1110 310" fill="none" stroke="#6b2f1f" stroke-width="7"/><rect x="230" y="368" width="250" height="82" rx="0" fill="#eedfd7" stroke="#6b2f1f" stroke-width="2"/><text x="355" y="419" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="25" font-weight="700" letter-spacing="0" fill="#6b2f1f">0000</text><rect x="480" y="368" width="110" height="82" rx="0" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="535" y="419" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="25" font-weight="700" letter-spacing="0" fill="#24513f">0001</text><rect x="590" y="368" width="110" height="82" rx="0" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="645" y="419" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="25" font-weight="700" letter-spacing="0" fill="#24513f">0010</text><rect x="700" y="368" width="110" height="82" rx="0" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="755" y="419" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="25" font-weight="700" letter-spacing="0" fill="#24513f">0011</text><rect x="810" y="368" width="110" height="82" rx="0" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="865" y="419" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="25" font-weight="700" letter-spacing="0" fill="#24513f">0100</text><rect x="920" y="368" width="190" height="82" rx="0" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="1015" y="419" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="25" font-weight="700" letter-spacing="0" fill="#24513f">0101</text><line x1="535" y1="126" x2="535" y2="362" stroke="#24513f" stroke-width="2" stroke-dasharray="5 7"/><circle cx="535" cy="135" r="8" fill="#24513f"/><line x1="645" y1="126" x2="645" y2="362" stroke="#24513f" stroke-width="2" stroke-dasharray="5 7"/><circle cx="645" cy="135" r="8" fill="#24513f"/><line x1="755" y1="126" x2="755" y2="362" stroke="#24513f" stroke-width="2" stroke-dasharray="5 7"/><circle cx="755" cy="135" r="8" fill="#24513f"/><line x1="865" y1="126" x2="865" y2="362" stroke="#24513f" stroke-width="2" stroke-dasharray="5 7"/><circle cx="865" cy="135" r="8" fill="#24513f"/><line x1="975" y1="126" x2="975" y2="362" stroke="#24513f" stroke-width="2" stroke-dasharray="5 7"/><circle cx="975" cy="135" r="8" fill="#24513f"/><rect x="225" y="582" width="750" height="42" rx="21" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="600" y="611" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.4" fill="#171717">RELEASE RESET BETWEEN EDGES; SAMPLE AFTER THE NONBLOCKING UPDATE</text>
</svg>
