<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-labelledby="arrays-loops-checks-title arrays-loops-checks-desc">
  <title id="arrays-loops-checks-title">Packed vectors, unpacked arrays, repeated hardware, and checks</title>
  <desc id="arrays-loops-checks-desc">A packed byte is one vector of adjacent bits, an unpacked memory is an array of words, a constant-bound loop describes repeated hardware, and an assertion checks expected behavior.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#171717"/>
    </marker>
    <marker id="forest-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#24513f"/>
    </marker>
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#b8b4a8"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#faf8f2"/>
  <text x="600" y="58" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="34" font-weight="700" letter-spacing="0" fill="#171717">Shape is part of the type — and part of the hardware</text><rect x="55" y="105" width="530" height="210" rx="12" fill="#ffffff" stroke="#3d5861" stroke-width="3"/><text x="320" y="143" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="23" font-weight="700" letter-spacing="0" fill="#3d5861">PACKED VECTOR</text><text x="320" y="176" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="20" font-weight="400" letter-spacing="0" fill="#171717">logic [7:0] byte_value;</text><rect x="104" y="208" width="50" height="58" rx="3" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="129" y="244" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="0" fill="#3d5861">7</text><rect x="159" y="208" width="50" height="58" rx="3" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="184" y="244" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="0" fill="#3d5861">6</text><rect x="214" y="208" width="50" height="58" rx="3" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="239" y="244" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="0" fill="#3d5861">5</text><rect x="269" y="208" width="50" height="58" rx="3" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="294" y="244" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="0" fill="#3d5861">4</text><rect x="324" y="208" width="50" height="58" rx="3" fill="#f1e8c8" stroke="#3d5861" stroke-width="2"/><text x="349" y="244" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="0" fill="#3d5861">3</text><rect x="379" y="208" width="50" height="58" rx="3" fill="#f1e8c8" stroke="#3d5861" stroke-width="2"/><text x="404" y="244" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="0" fill="#3d5861">2</text><rect x="434" y="208" width="50" height="58" rx="3" fill="#f1e8c8" stroke="#3d5861" stroke-width="2"/><text x="459" y="244" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="0" fill="#3d5861">1</text><rect x="489" y="208" width="50" height="58" rx="3" fill="#f1e8c8" stroke="#3d5861" stroke-width="2"/><text x="514" y="244" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="0" fill="#3d5861">0</text><rect x="615" y="105" width="530" height="210" rx="12" fill="#ffffff" stroke="#9a7422" stroke-width="3"/><text x="880" y="143" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="23" font-weight="700" letter-spacing="0" fill="#9a7422">UNPACKED ARRAY OF WORDS</text><text x="880" y="176" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="20" font-weight="400" letter-spacing="0" fill="#171717">logic [7:0] memory [0:3];</text><text x="716" y="219" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="16" font-weight="700" letter-spacing="0" fill="#9a7422">[0]</text><rect x="744" y="203" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="786" y="203" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><rect x="828" y="203" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="870" y="203" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><rect x="912" y="203" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="954" y="203" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><rect x="996" y="203" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="1038" y="203" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><text x="716" y="244" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="16" font-weight="700" letter-spacing="0" fill="#9a7422">[1]</text><rect x="744" y="228" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="786" y="228" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><rect x="828" y="228" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="870" y="228" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><rect x="912" y="228" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="954" y="228" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><rect x="996" y="228" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="1038" y="228" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><text x="716" y="269" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="16" font-weight="700" letter-spacing="0" fill="#9a7422">[2]</text><rect x="744" y="253" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="786" y="253" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><rect x="828" y="253" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="870" y="253" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><rect x="912" y="253" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="954" y="253" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><rect x="996" y="253" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="1038" y="253" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><text x="716" y="294" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="16" font-weight="700" letter-spacing="0" fill="#9a7422">[3]</text><rect x="744" y="278" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="786" y="278" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><rect x="828" y="278" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="870" y="278" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><rect x="912" y="278" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="954" y="278" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><rect x="996" y="278" width="36" height="20" rx="1" fill="#ffffff" stroke="#9a7422" stroke-width="1"/><rect x="1038" y="278" width="36" height="20" rx="1" fill="#f1e8c8" stroke="#9a7422" stroke-width="1"/><rect x="55" y="350" width="690" height="230" rx="12" fill="#ffffff" stroke="#24513f" stroke-width="3"/><text x="400" y="389" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="23" font-weight="700" letter-spacing="0" fill="#24513f">CONSTANT-BOUND LOOP → REPEATED LANES</text><text x="400" y="426" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="19" font-weight="400" letter-spacing="0" fill="#171717">for (int lane = 0; lane &lt; 4; lane++)</text><rect x="102" y="469" width="118" height="65" rx="7" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="161" y="509" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0" fill="#24513f">LANE 0</text><rect x="257" y="469" width="118" height="65" rx="7" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="316" y="509" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0" fill="#24513f">LANE 1</text><rect x="412" y="469" width="118" height="65" rx="7" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="471" y="509" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0" fill="#24513f">LANE 2</text><rect x="567" y="469" width="118" height="65" rx="7" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="626" y="509" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0" fill="#24513f">LANE 3</text><rect x="785" y="350" width="360" height="230" rx="12" fill="#eedfd7" stroke="#6b2f1f" stroke-width="3"/><text x="965" y="390" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="23" font-weight="700" letter-spacing="0" fill="#6b2f1f">CHECK THE CLAIM</text><text x="965" y="447" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="19" font-weight="700" fill="#171717"><tspan x="965" dy="0">assert (result == expected)</tspan><tspan x="965" dy="28.5">else $fatal(1, &quot;mismatch&quot;);</tspan></text><rect x="270" y="617" width="660" height="42" rx="21" fill="#eedfd7" stroke="#6b2f1f" stroke-width="2"/><text x="600" y="646" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.4" fill="#171717">SIMULATION SUPPORT ≠ SYNTHESIS SUPPORT — CHECK BOTH</text>
</svg>
