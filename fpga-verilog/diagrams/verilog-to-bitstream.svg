<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-labelledby="verilog-to-bitstream-title verilog-to-bitstream-desc">
  <title id="verilog-to-bitstream-title">Open-source simulation and iCE40 implementation flows</title>
  <desc id="verilog-to-bitstream-desc">Verilog can take a simulation path through Icarus Verilog, VCD, and GTKWave, or an implementation path through Yosys, nextpnr, IceStorm icepack, a binary bitstream, and an FPGA loader.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#171717"/>
    </marker>
    <marker id="forest-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#24513f"/>
    </marker>
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#b8b4a8"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#faf8f2"/>
  <text x="600" y="58" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="34" font-weight="700" letter-spacing="0" fill="#171717">Simulate the behavior; implement the hardware</text><rect x="60" y="102" width="1080" height="190" rx="12" fill="#ffffff" stroke="#6b2f1f" stroke-width="3"/><rect x="88" y="126" width="232" height="42" rx="21" fill="#eedfd7" stroke="#6b2f1f" stroke-width="2"/><text x="204" y="155" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0.4" fill="#6b2f1f">SIMULATION PATH</text><rect x="95" y="202" width="205" height="60" rx="8" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="197.5" y="239" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0" fill="#3d5861">Verilog + testbench</text><line x1="300" y1="232" x2="343" y2="232" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><rect x="350" y="202" width="205" height="60" rx="8" fill="#eedfd7" stroke="#6b2f1f" stroke-width="2"/><text x="452.5" y="239" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0" fill="#6b2f1f">Icarus Verilog</text><line x1="555" y1="232" x2="598" y2="232" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><rect x="605" y="202" width="205" height="60" rx="8" fill="#f1e8c8" stroke="#9a7422" stroke-width="2"/><text x="707.5" y="239" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0" fill="#9a7422">VCD waveform</text><line x1="810" y1="232" x2="853" y2="232" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><rect x="860" y="202" width="205" height="60" rx="8" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="962.5" y="239" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0" fill="#24513f">GTKWave + checks</text><rect x="60" y="326" width="1080" height="258" rx="12" fill="#ffffff" stroke="#24513f" stroke-width="3"/><rect x="88" y="350" width="262" height="42" rx="21" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="219" y="379" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0.4" fill="#24513f">IMPLEMENTATION PATH</text><rect x="80" y="437" width="168" height="92" rx="8" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="164" y="473" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#3d5861"><tspan x="164" dy="0">Verilog</tspan><tspan x="164" dy="24.3">top module</tspan></text><line x1="248" y1="483" x2="283" y2="483" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><rect x="285" y="437" width="168" height="92" rx="8" fill="#f1e8c8" stroke="#9a7422" stroke-width="2"/><text x="369" y="473" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#9a7422"><tspan x="369" dy="0">Yosys</tspan><tspan x="369" dy="24.3">JSON netlist</tspan></text><line x1="453" y1="483" x2="488" y2="483" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><rect x="490" y="437" width="168" height="92" rx="8" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="574" y="473" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#24513f"><tspan x="574" dy="0">nextpnr</tspan><tspan x="574" dy="24.3">placed + routed</tspan></text><line x1="658" y1="483" x2="693" y2="483" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><rect x="695" y="437" width="168" height="92" rx="8" fill="#eedfd7" stroke="#6b2f1f" stroke-width="2"/><text x="779" y="473" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#6b2f1f"><tspan x="779" dy="0">icepack</tspan><tspan x="779" dy="24.3">.bin bitstream</tspan></text><line x1="863" y1="483" x2="898" y2="483" stroke="#171717" stroke-width="3" marker-end="url(#arrow)"/><rect x="900" y="437" width="210" height="92" rx="8" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="1005" y="473" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#3d5861"><tspan x="1005" dy="0">loader + FPGA</tspan><tspan x="1005" dy="24.3">configured circuit</tspan></text><text x="575" y="559" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" letter-spacing="0" fill="#24513f">board constraints enter at place-and-route</text><line x1="575" y1="585" x2="575" y2="534" stroke="#24513f" stroke-width="2" marker-end="url(#forest-arrow)"/><rect x="245" y="619" width="710" height="42" rx="21" fill="#f1e8c8" stroke="#9a7422" stroke-width="2"/><text x="600" y="648" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.4" fill="#171717">A BITSTREAM IS THE CONFIGURATION RESULT, NOT THE VERILOG SOURCE</text>
</svg>
