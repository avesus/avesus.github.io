<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-labelledby="mental-models-hdl-title mental-models-hdl-desc">
  <title id="mental-models-hdl-title">Comparing HDL with familiar software mental models</title>
  <desc id="mental-models-hdl-desc">SQL, publish-subscribe, input-output streams, and Arduino loops each illuminate one aspect of Verilog, but none is the full model of concurrent hardware over time.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#171717"/>
    </marker>
    <marker id="forest-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#24513f"/>
    </marker>
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#b8b4a8"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#faf8f2"/>
  <text x="600" y="58" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="34" font-weight="700" letter-spacing="0" fill="#171717">Useful analogies — and where each one breaks</text><rect x="390" y="226" width="420" height="220" rx="24" fill="#dce9e2" stroke="#24513f" stroke-width="4"/><text x="600" y="284" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="31" font-weight="700" fill="#24513f"><tspan x="600" dy="0">HDL DESCRIBES</tspan><tspan x="600" dy="38.44">CONCURRENT HARDWARE</tspan><tspan x="600" dy="38.44">CHANGING OVER TIME</tspan></text><rect x="65" y="110" width="300" height="150" rx="12" fill="#dfe9ec" stroke="#3d5861" stroke-width="3"/><text x="215" y="150" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0" fill="#3d5861">SQL / SETS</text><text x="215" y="192" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="400" fill="#171717"><tspan x="215" dy="0">Declarative relationships</tspan><tspan x="215" dy="25.2">Not a clocked physical netlist</tspan></text><line x1="365" y1="185" x2="390" y2="280" stroke="#3d5861" stroke-width="3" marker-end="url(#arrow)"/><rect x="835" y="110" width="300" height="150" rx="12" fill="#f1e8c8" stroke="#9a7422" stroke-width="3"/><text x="985" y="150" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0" fill="#9a7422">PUBLISH / SUBSCRIBE</text><text x="985" y="192" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="400" fill="#171717"><tspan x="985" dy="0">Changes propagate</tspan><tspan x="985" dy="25.2">No broker or queued messages</tspan></text><line x1="835" y1="185" x2="810" y2="280" stroke="#9a7422" stroke-width="3" marker-end="url(#arrow)"/><rect x="65" y="430" width="300" height="150" rx="12" fill="#eedfd7" stroke="#6b2f1f" stroke-width="3"/><text x="215" y="470" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0" fill="#6b2f1f">INPUT / OUTPUT</text><text x="215" y="512" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="400" fill="#171717"><tspan x="215" dy="0">Pins exchange many signals</tspan><tspan x="215" dy="25.2">Not an instruction stream</tspan></text><line x1="365" y1="505" x2="390" y2="390" stroke="#6b2f1f" stroke-width="3" marker-end="url(#arrow)"/><rect x="835" y="430" width="300" height="150" rx="12" fill="#dce9e2" stroke="#24513f" stroke-width="3"/><text x="985" y="470" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0" fill="#24513f">ARDUINO LOOP</text><text x="985" y="512" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="400" fill="#171717"><tspan x="985" dy="0">initial / always look familiar</tspan><tspan x="985" dy="25.2">But blocks run concurrently</tspan></text><line x1="835" y1="505" x2="810" y2="390" stroke="#24513f" stroke-width="3" marker-end="url(#arrow)"/><rect x="290" y="612" width="620" height="42" rx="21" fill="#ffffff" stroke="#171717" stroke-width="2"/><text x="600" y="641" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.4" fill="#171717">KEEP THE ANALOGY; DISCARD THE FALSE EQUIVALENCE</text>
</svg>
