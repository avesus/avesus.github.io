      <circle cx="2" cy="2" r="1.2" fill="#b8b4a8"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#faf8f2"/>
  <text x="600" y="54" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="34" font-weight="700" letter-spacing="0" fill="#171717">All things, all the time — one layer at a time</text><text x="600" y="88" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="19" font-weight="400" letter-spacing="0" fill="#5f625d">Seven chapters connect the mental model to a configured physical device.</text><line x1="120" y1="341" x2="1080" y2="341" stroke="#b8b4a8" stroke-width="5"/><circle cx="120" cy="341" r="34" fill="#eedfd7" stroke="#6b2f1f" stroke-width="4"/><text x="120" y="350" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="700" letter-spacing="0" fill="#6b2f1f">1</text><rect x="51" y="151" width="138" height="112" rx="9" fill="#ffffff" stroke="#6b2f1f" stroke-width="3"/><text x="120" y="194" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#6b2f1f"><tspan x="120" dy="0">WHAT AN</tspan><tspan x="120" dy="22.950000000000003">FPGA IS</tspan></text><line x1="120" y1="263" x2="120" y2="302" stroke="#6b2f1f" stroke-width="3" marker-end="url(#arrow)"/><circle cx="280" cy="341" r="34" fill="#f1e8c8" stroke="#9a7422" stroke-width="4"/><text x="280" y="350" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="700" letter-spacing="0" fill="#9a7422">2</text><rect x="211" y="416" width="138" height="112" rx="9" fill="#ffffff" stroke="#9a7422" stroke-width="3"/><text x="280" y="459" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#9a7422"><tspan x="280" dy="0">INSIDE THE</tspan><tspan x="280" dy="22.950000000000003">FABRIC</tspan></text><line x1="280" y1="416" x2="280" y2="380" stroke="#9a7422" stroke-width="3"/><circle cx="440" cy="341" r="34" fill="#dfe9ec" stroke="#3d5861" stroke-width="4"/><text x="440" y="350" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="700" letter-spacing="0" fill="#3d5861">3</text><rect x="371" y="151" width="138" height="112" rx="9" fill="#ffffff" stroke="#3d5861" stroke-width="3"/><text x="440" y="194" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#3d5861"><tspan x="440" dy="0">LEARNING</tspan><tspan x="440" dy="22.950000000000003">ROADMAP</tspan></text><line x1="440" y1="263" x2="440" y2="302" stroke="#3d5861" stroke-width="3" marker-end="url(#arrow)"/><circle cx="600" cy="341" r="34" fill="#dce9e2" stroke="#24513f" stroke-width="4"/><text x="600" y="350" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="700" letter-spacing="0" fill="#24513f">4</text><rect x="531" y="416" width="138" height="112" rx="9" fill="#ffffff" stroke="#24513f" stroke-width="3"/><text x="600" y="459" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#24513f"><tspan x="600" dy="0">VERILOG</tspan><tspan x="600" dy="22.950000000000003">WORKBENCH</tspan></text><line x1="600" y1="416" x2="600" y2="380" stroke="#24513f" stroke-width="3"/><circle cx="760" cy="341" r="34" fill="#dfe9ec" stroke="#3d5861" stroke-width="4"/><text x="760" y="350" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="700" letter-spacing="0" fill="#3d5861">5</text><rect x="691" y="151" width="138" height="112" rx="9" fill="#ffffff" stroke="#3d5861" stroke-width="3"/><text x="760" y="194" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#3d5861"><tspan x="760" dy="0">PROJECT</tspan><tspan x="760" dy="22.950000000000003">ANATOMY</tspan></text><line x1="760" y1="263" x2="760" y2="302" stroke="#3d5861" stroke-width="3" marker-end="url(#arrow)"/><circle cx="920" cy="341" r="34" fill="#eedfd7" stroke="#6b2f1f" stroke-width="4"/><text x="920" y="350" text-anchor="middle" font-f