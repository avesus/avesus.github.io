<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-labelledby="fpga-verilog-course-map-title fpga-verilog-course-map-desc">
  <title id="fpga-verilog-course-map-title">Seven-chapter path from Boolean logic to a programmed FPGA</title>
  <desc id="fpga-verilog-course-map-desc">The course moves through FPGA identity, fabric anatomy, a learning roadmap, a Verilog workbench, project structure, a counter recreation, and an open-source board flow.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
