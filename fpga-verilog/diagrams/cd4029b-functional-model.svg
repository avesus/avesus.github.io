<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-labelledby="cd4029b-functional-model-title cd4029b-functional-model-desc">
  <title id="cd4029b-functional-model-title">Functional model of a CD4029B-inspired four-bit counter</title>
  <desc id="cd4029b-functional-model-desc">Control inputs choose binary or decade counting, up or down direction, preset loading, and clocked state updates, while carry logic supports cascading.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#171717"/>
    </marker>
    <marker id="forest-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#24513f"/>
    </marker>
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#b8b4a8"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#faf8f2"/>
  <text x="600" y="55" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="34" font-weight="700" letter-spacing="0" fill="#171717">Recreate the behavior before imitating the package</text><rect x="355" y="138" width="490" height="385" rx="12" fill="#ffffff" stroke="#24513f" stroke-width="4"/><text x="600" y="182" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="23" font-weight="700" letter-spacing="0" fill="#24513f">4-BIT PRESETTABLE UP / DOWN COUNTER</text><rect x="72" y="212" width="205" height="42" rx="21" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="174.5" y="241" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.4" fill="#3d5861">CLOCK</text><line x1="277" y1="233" x2="355" y2="233" stroke="#3d5861" stroke-width="3" marker-end="url(#arrow)"/><text x="381" y="240" text-anchor="start" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="400" letter-spacing="0" fill="#5f625d">advance on the selected edge</text><rect x="72" y="267" width="205" height="42" rx="21" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="174.5" y="296" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.4" fill="#3d5861">PRESET ENABLE</text><line x1="277" y1="288" x2="355" y2="288" stroke="#3d5861" stroke-width="3" marker-end="url(#arrow)"/><text x="381" y="295" text-anchor="start" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="400" letter-spacing="0" fill="#5f625d">load P[3:0] instead of counting</text><rect x="72" y="322" width="205" height="42" rx="21" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="174.5" y="351" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.4" fill="#3d5861">UP / DOWN</text><line x1="277" y1="343" x2="355" y2="343" stroke="#3d5861" stroke-width="3" marker-end="url(#arrow)"/><text x="381" y="350" text-anchor="start" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="400" letter-spacing="0" fill="#5f625d">choose the arithmetic direction</text><rect x="72" y="377" width="205" height="42" rx="21" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="174.5" y="406" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.4" fill="#3d5861">BINARY / DECADE</text><line x1="277" y1="398" x2="355" y2="398" stroke="#3d5861" stroke-width="3" marker-end="url(#arrow)"/><text x="381" y="405" text-anchor="start" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="400" letter-spacing="0" fill="#5f625d">choose modulus 16 or modulus 10</text><rect x="470" y="458" width="260" height="42" rx="21" fill="#f1e8c8" stroke="#9a7422" stroke-width="2"/><text x="600" y="487" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.4" fill="#9a7422">P[3:0] PRESET DATA</text><line x1="600" y1="458" x2="600" y2="426" stroke="#9a7422" stroke-width="3" marker-end="url(#arrow)"/><line x1="845" y1="232" x2="930" y2="232" stroke="#6b2f1f" stroke-width="3" marker-end="url(#arrow)"/><rect x="930" y="211" width="200" height="42" rx="21" fill="#eedfd7" stroke="#6b2f1f" stroke-width="2"/><text x="1030" y="240" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.4" fill="#6b2f1f">Q[3:0]</text><text x="1030" y="280" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="400" letter-spacing="0" fill="#5f625d">current state</text><line x1="845" y1="322" x2="930" y2="322" stroke="#6b2f1f" stroke-width="3" marker-end="url(#arrow)"/><rect x="930" y="301" width="200" height="42" rx="21" fill="#eedfd7" stroke="#6b2f1f" stroke-width="2"/><text x="1030" y="330" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.4" fill="#6b2f1f">CARRY OUT</text><text x="1030" y="370" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="400" letter-spacing="0" fill="#5f625d">cascade the next stage</text><rect x="237" y="595" width="726" height="42" rx="21" fill="#f1e8c8" stroke="#9a7422" stroke-width="2"/><text x="600" y="624" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" letter-spacing="0.4" fill="#171717">THE DATASHEET DEFINES OBSERVABLE BEHAVIOR; YOUR TESTBENCH MAKES IT EXECUTABLE</text>
</svg>
