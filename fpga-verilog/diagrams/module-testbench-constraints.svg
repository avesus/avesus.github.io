<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-labelledby="module-testbench-constraints-title module-testbench-constraints-desc">
  <title id="module-testbench-constraints-title">The three-file shape of a small FPGA project</title>
  <desc id="module-testbench-constraints-desc">A top module is shared by two paths: a testbench drives and checks it in simulation, while a board constraint file binds its ports and timing to physical hardware.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#171717"/>
    </marker>
    <marker id="forest-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#24513f"/>
    </marker>
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#b8b4a8"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#faf8f2"/>
  <text x="600" y="58" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="34" font-weight="700" letter-spacing="0" fill="#171717">One design, two different questions</text><rect x="420" y="118" width="360" height="126" rx="12" fill="#dfe9ec" stroke="#3d5861" stroke-width="4"/><text x="600" y="166" text-anchor="middle" font-family="Inconsolata, Consolas, monospace" font-size="28" font-weight="700" letter-spacing="0" fill="#3d5861">counter.v</text><text x="600" y="205" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="19" font-weight="400" letter-spacing="0" fill="#5f625d">top module / design under test</text><line x1="500" y1="244" x2="315" y2="326" stroke="#6b2f1f" stroke-width="4" marker-end="url(#arrow)"/><line x1="700" y1="244" x2="885" y2="326" stroke="#24513f" stroke-width="4" marker-end="url(#arrow)"/><rect x="65" y="310" width="500" height="270" rx="12" fill="#ffffff" stroke="#6b2f1f" stroke-width="3"/><rect x="635" y="310" width="500" height="270" rx="12" fill="#ffffff" stroke="#24513f" stroke-width="3"/><rect x="190" y="336" width="250" height="42" rx="21" fill="#eedfd7" stroke="#6b2f1f" stroke-width="2"/><text x="315" y="365" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0.4" fill="#6b2f1f">SIMULATION PATH</text><rect x="760" y="336" width="250" height="42" rx="21" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="885" y="365" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0.4" fill="#24513f">HARDWARE PATH</text><rect x="105" y="408" width="180" height="86" rx="7" fill="#eedfd7" stroke="#6b2f1f" stroke-width="3"/><text x="195" y="443" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#6b2f1f"><tspan x="195" dy="0">counter_tb.v</tspan><tspan x="195" dy="25">drive + check</tspan></text><line x1="285" y1="451" x2="355" y2="451" stroke="#6b2f1f" stroke-width="3" marker-end="url(#arrow)"/><rect x="355" y="408" width="170" height="86" rx="7" fill="#dfe9ec" stroke="#3d5861" stroke-width="3"/><text x="440" y="443" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#3d5861"><tspan x="440" dy="0">DUT</tspan><tspan x="440" dy="25">signals</tspan></text><line x1="440" y1="494" x2="440" y2="530" stroke="#6b2f1f" stroke-width="3" marker-end="url(#arrow)"/><text x="440" y="558" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0" fill="#6b2f1f">VCD + assertions</text><rect x="675" y="408" width="190" height="86" rx="7" fill="#f1e8c8" stroke="#9a7422" stroke-width="3"/><text x="770" y="443" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#9a7422"><tspan x="770" dy="0">board.pcf / xdc</tspan><tspan x="770" dy="23.75">pins + clocks</tspan></text><line x1="865" y1="451" x2="910" y2="451" stroke="#24513f" stroke-width="3" marker-end="url(#arrow)"/><rect x="910" y="408" width="185" height="86" rx="7" fill="#dce9e2" stroke="#24513f" stroke-width="3"/><text x="1002" y="443" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#24513f"><tspan x="1002" dy="0">synthesis + P&amp;R</tspan><tspan x="1002" dy="22.5">bitstream</tspan></text><line x1="1002" y1="494" x2="1002" y2="530" stroke="#24513f" stroke-width="3" marker-end="url(#arrow)"/><text x="1002" y="558" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0" fill="#24513f">physical pins + timing</text><rect x="254" y="616" width="692" height="42" rx="21" fill="#f1e8c8" stroke="#9a7422" stroke-width="2"/><text x="600" y="645" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0.4" fill="#171717">A PASSING TESTBENCH IS NOT A TIMING-CLOSED BOARD BUILD</text>
</svg>
