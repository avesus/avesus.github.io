<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-labelledby="hardwired-field-programmable-title hardwired-field-programmable-desc">
  <title id="hardwired-field-programmable-title">Hard-wired ASIC routing and field-programmable FPGA routing</title>
  <desc id="hardwired-field-programmable-desc">The same hardware description can lead either to fixed fabrication masks or to a reloadable FPGA configuration bitstream.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#171717"/>
    </marker>
    <marker id="forest-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#24513f"/>
    </marker>
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#b8b4a8"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#faf8f2"/>
  <text x="600" y="64" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="34" font-weight="700" letter-spacing="0" fill="#171717">One hardware description, two physical commitments</text><rect x="448" y="91" width="304" height="42" rx="21" fill="#dfe9ec" stroke="#3d5861" stroke-width="2"/><text x="600" y="120" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0.4" fill="#3d5861">VERILOG OR VHDL</text><line x1="515" y1="136" x2="315" y2="198" stroke="#3d5861" stroke-width="3" marker-end="url(#arrow)"/><line x1="685" y1="136" x2="885" y2="198" stroke="#3d5861" stroke-width="3" marker-end="url(#arrow)"/><rect x="70" y="190" width="470" height="375" rx="12" fill="#ffffff" stroke="#6b2f1f" stroke-width="3"/><rect x="660" y="190" width="470" height="375" rx="12" fill="#ffffff" stroke="#24513f" stroke-width="3"/><text x="305" y="232" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="700" letter-spacing="0" fill="#6b2f1f">ASIC: hard-wired in the fab</text><text x="895" y="232" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="700" letter-spacing="0" fill="#24513f">FPGA: soft-wired in the field</text><rect x="144" y="258" width="322" height="42" rx="21" fill="#eedfd7" stroke="#6b2f1f" stroke-width="2"/><text x="305" y="287" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0.4" fill="#6b2f1f">PLACE + ROUTE → MASK DATA</text><rect x="734" y="258" width="322" height="42" rx="21" fill="#dce9e2" stroke="#24513f" stroke-width="2"/><text x="895" y="287" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0.4" fill="#24513f">PLACE + ROUTE → BITSTREAM</text><rect x="145" y="330" width="320" height="165" rx="8" fill="#eedfd7" stroke="#6b2f1f" stroke-width="3"/><rect x="735" y="330" width="320" height="165" rx="8" fill="#dce9e2" stroke="#24513f" stroke-width="3"/><line x1="180" y1="360" x2="430" y2="360" stroke="#6b2f1f" stroke-width="7"/><line x1="180" y1="395" x2="430" y2="395" stroke="#9a7422" stroke-width="7"/><line x1="180" y1="430" x2="430" y2="430" stroke="#6b2f1f" stroke-width="7"/><line x1="180" y1="465" x2="430" y2="465" stroke="#9a7422" stroke-width="7"/><rect x="770" y="358" width="26" height="26" rx="3" fill="#24513f" stroke="#24513f" stroke-width="2"/><rect x="822" y="358" width="26" height="26" rx="3" fill="#ffffff" stroke="#24513f" stroke-width="2"/><rect x="874" y="358" width="26" height="26" rx="3" fill="#24513f" stroke="#24513f" stroke-width="2"/><rect x="926" y="358" width="26" height="26" rx="3" fill="#ffffff" stroke="#24513f" stroke-width="2"/><rect x="978" y="358" width="26" height="26" rx="3" fill="#24513f" stroke="#24513f" stroke-width="2"/><line x1="783" y1="397" x2="991" y2="397" stroke="#9a7422" stroke-width="6"/><line x1="783" y1="432" x2="991" y2="432" stroke="#24513f" stroke-width="6"/><line x1="809" y1="397" x2="809" y2="468" stroke="#9a7422" stroke-width="5"/><line x1="913" y1="397" x2="913" y2="468" stroke="#24513f" stroke-width="5"/><text x="305" y="526" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="400" fill="#5f625d"><tspan x="305" dy="0">Metal and transistor geometry</tspan><tspan x="305" dy="25">become fixed at manufacture</tspan></text><text x="895" y="526" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="400" fill="#5f625d"><tspan x="895" dy="0">Configuration cells select</tspan><tspan x="895" dy="25">logic roles and routes again</tspan></text><rect x="267" y="604" width="666" height="42" rx="21" fill="#f1e8c8" stroke="#9a7422" stroke-width="2"/><text x="600" y="633" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="0.4" fill="#171717">RECONFIGURATION CHANGES THE FPGA CIRCUIT, NOT THE SILICON</text>
</svg>
