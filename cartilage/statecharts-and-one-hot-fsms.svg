<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Hierarchical statechart mapped to one-hot state bits</title>
  <desc id="desc">A four-state installation controller with nested receive states maps to four visible one-hot registers.</desc>
  <rect width="1200" height="675" fill="#faf8f2"/>
  <g fill="#fff" stroke="#28363a" stroke-width="4">
    <rect x="42" y="58" width="610" height="548" rx="12"/>
    <rect x="714" y="58" width="444" height="548" rx="12"/>
    <rect x="92" y="154" width="170" height="78" rx="18" fill="#eef4ec"/>
    <rect x="330" y="130" width="260" height="236" rx="18" fill="#f3f0e7"/>
    <rect x="364" y="188" width="92" height="58" rx="14"/>
    <rect x="474" y="188" width="82" height="58" rx="14"/>
    <rect x="92" y="432" width="170" height="78" rx="18"/>
    <rect x="420" y="432" width="170" height="78" rx="18" fill="#eef4ec"/>
  </g>
  <g fill="none" stroke="#520" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M262 193 H330"/><path d="M320 183 L330 193 L320 203"/>
    <path d="M456 217 H474"/><path d="M464 207 L474 217 L464 227"/>
    <path d="M460 366 V432"/><path d="M450 422 L460 432 L470 422"/>
    <path d="M420 471 H262"/><path d="M272 461 L262 471 L272 481"/>
    <path d="M177 432 V232"/><path d="M167 242 L177 232 L187 242"/>
  </g>
  <g fill="#28363a" font-family="Georgia, serif" text-anchor="middle">
    <text x="347" y="108" font-size="30">Hierarchical behavior</text>
    <text x="177" y="201" font-size="25">IDLE</text>
    <text x="460" y="170" font-size="24">RECEIVE</text>
    <text x="410" y="225" font-size="20">bits</text>
    <text x="515" y="225" font-size="20">done</text>
    <text x="177" y="479" font-size="25">APPLY</text>
    <text x="505" y="479" font-size="25">RUN</text>
    <text x="936" y="108" font-size="30">Visible one-hot state</text>
  </g>
  <g font-family="Consolas, monospace" font-size="24">
    <text x="770" y="196" fill="#520">IDLE</text><text x="1028" y="196" fill="#28363a">0001</text>
    <text x="770" y="276" fill="#520">RECEIVE</text><text x="1028" y="276" fill="#28363a">0010</text>
    <text x="770" y="356" fill="#520">APPLY</text><text x="1028" y="356" fill="#28363a">0100</text>
    <text x="770" y="436" fill="#520">RUN</text><text x="1028" y="436" fill="#28363a">1000</text>
  </g>
  <text x="936" y="524" fill="#28363a" font-family="Georgia, serif" font-size="24" text-anchor="middle">One storage location names each state.</text>
</svg>
